<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agents — Averray operator</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  /* ---------- page frame ---------- */
  html, body { background: var(--avy-bg); }
  body {
    /* warm paper-grid background */
    background-image:
      radial-gradient(1200px 700px at 12% -10%, rgba(30,102,66,0.07), transparent 60%),
      radial-gradient(900px 600px at 110% 0%, rgba(167,97,34,0.05), transparent 60%),
      linear-gradient(var(--avy-line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--avy-line-soft) 1px, transparent 1px);
    background-size: auto, auto, 3.2rem 3.2rem, 3.2rem 3.2rem;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    color: var(--avy-ink);
  }

  .shell {
    display: grid;
    grid-template-columns: 17rem minmax(0, 1fr);
    min-height: 100vh;
  }

  /* ---------- left rail (17rem) ---------- */
  .rail {
    position: sticky; top: 0; align-self: start;
    height: 100vh;
    border-right: 1px solid var(--avy-line);
    background: rgba(247, 245, 236, 0.82);
    backdrop-filter: blur(10px);
    padding: 1.15rem 0.95rem;
    display: flex; flex-direction: column; gap: 1.2rem;
  }
  .rail__brand { display: flex; align-items: center; gap: 0.6rem; padding: 0.15rem 0.3rem 0.4rem; }
  .rail__brand-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--avy-dark); color: var(--fg-invert);
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 800; font-size: 16px;
  }
  .rail__brand-name { font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; }
  .rail__brand-sub {
    font-family: var(--font-display); font-size: 0.64rem; font-weight: 800;
    letter-spacing: 0.14em !important; text-transform: uppercase; color: var(--avy-accent);
    margin-top: 2px;
  }
  .rail__group-label {
    font-family: var(--font-display); font-size: 0.66rem; font-weight: 800;
    letter-spacing: 0.16em !important; text-transform: uppercase; color: var(--avy-muted);
    padding: 0 0.55rem; margin: 0 0 0.3rem;
  }
  .rail__nav { display: grid; gap: 2px; }
  .rail__item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.55rem 0.6rem; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.9rem; color: var(--avy-ink); cursor: default;
  }
  .rail__item:hover { background: rgba(17,19,21,0.04); }
  .rail__item.is-active { background: rgba(30,102,66,0.10); color: var(--avy-accent); font-weight: 700; box-shadow: inset 0 0 0 1px rgba(30,102,66,0.12); }
  .rail__ico { width: 16px; text-align: center; opacity: 0.8; font-size: 0.82rem; }
  .rail__count { margin-left: auto; font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted); }
  .rail__item.is-active .rail__count { color: var(--avy-accent); }
  .rail__wallet {
    margin-top: auto; border: 1px solid var(--avy-line); border-radius: 10px;
    padding: 0.7rem 0.8rem; background: var(--avy-paper-solid);
    display: grid; gap: 0.3rem;
  }
  .rail__wallet-label {
    font-family: var(--font-display); font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-accent);
  }
  .rail__wallet-addr { font-family: var(--font-mono); font-size: 0.78rem; color: var(--avy-ink); }
  .rail__wallet-meta { font-family: var(--font-body); font-size: 0.72rem; color: var(--avy-muted); }

  /* ---------- canvas (max-width 1100px) ---------- */
  .canvas-wrap { padding: 1.2rem 1.6rem 6rem; }
  .canvas { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  /* ---------- topbar ---------- */
  .topbar {
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    padding: 0.2rem 0;
  }
  .crumbs {
    display: flex; align-items: center; gap: 0.5rem;
    font-family: var(--font-display); font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.08em !important; text-transform: uppercase; color: var(--avy-muted);
  }
  .crumbs .cur { color: var(--avy-ink); }
  .crumbs .sep { color: var(--avy-line); }

  .topbar__right { display: flex; align-items: center; gap: 0.65rem; }
  .clock {
    display: flex; align-items: center; gap: 0.55rem;
    font-family: var(--font-mono); font-size: 0.76rem; color: var(--avy-muted);
    padding: 0.35rem 0.65rem;
    border: 1px solid var(--avy-line); border-radius: 8px;
    background: var(--avy-paper);
  }
  .clock .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--avy-accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.35; }
  }
  .clock .sep { opacity: 0.4; }
  .clock .block { color: var(--avy-accent); }

  .btn {
    display: inline-flex; align-items: center; gap: 0.45rem;
    height: 32px; padding: 0 0.85rem;
    border-radius: 8px;
    font-family: var(--font-display); font-size: 0.74rem; font-weight: 700;
    letter-spacing: 0.04em !important; text-transform: uppercase;
    border: 1px solid transparent; cursor: pointer;
    transition: transform 180ms var(--ease), background-color 180ms var(--ease), border-color 180ms var(--ease);
  }
  .btn--primary { background: var(--avy-accent); color: var(--fg-invert); }
  .btn--primary:hover { transform: translateY(-1px); background: #174f33; }
  .btn--ghost { background: rgba(255,255,255,0.6); color: var(--avy-ink); border-color: var(--avy-line); }
  .btn--ghost:hover { transform: translateY(-1px); border-color: rgba(30,102,66,0.22); background: rgba(255,255,255,0.92); }

  /* ---------- page header ---------- */
  .page-header { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.2rem; }
  .page-eyebrow {
    font-family: var(--font-display); font-size: 0.72rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-accent);
  }
  .page-title { font-family: var(--font-display); font-weight: 700; font-size: 2.4rem; line-height: 1; margin: 0; letter-spacing: -0.01em !important; }
  .page-lede { font-family: var(--font-body); font-size: 1rem; color: var(--avy-muted); max-width: 62ch; margin: 0.2rem 0 0; line-height: 1.55; }

  /* ---------- aggregate strip ---------- */
  .aggregates { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
  .agg {
    padding: 0.95rem 1rem;
    border: 1px solid var(--avy-line); border-radius: 10px;
    background: var(--avy-paper); backdrop-filter: blur(8px);
    box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; gap: 0.35rem;
    min-height: 96px;
  }
  .agg__head { display: flex; justify-content: space-between; align-items: baseline; }
  .agg__lbl {
    font-family: var(--font-display); font-size: 0.68rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-muted);
  }
  .agg__val {
    font-family: var(--font-display); font-weight: 700; font-size: 2rem; line-height: 1; color: var(--avy-ink);
    font-variant-numeric: tabular-nums;
    display: flex; align-items: baseline; gap: 0.4rem;
  }
  .agg__val .unit { font-size: 0.78rem; color: var(--avy-muted); font-weight: 600; }
  .agg__meta { display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted); }
  .agg__meta.ok   { color: var(--avy-accent); }
  .agg__meta.warn { color: var(--avy-warn); }
  .agg__meta.bad  { color: #8a2a2a; }

  .tier-chip {
    display: inline-flex; align-items: center; padding: 0.1rem 0.45rem;
    border-radius: 4px;
    font-family: var(--font-display); font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.08em !important; text-transform: uppercase;
    background: var(--avy-accent-soft); color: var(--avy-accent);
  }

  /* sparkline svg */
  .spark { width: 88px; height: 22px; display: block; }
  .spark--lg { width: 120px; height: 28px; }

  /* ---------- filter rail ---------- */
  .filter-rail {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.65rem;
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--avy-line); border-radius: 10px;
    background: var(--avy-paper); backdrop-filter: blur(8px);
  }
  .filter-group { display: flex; align-items: center; gap: 0.45rem; }
  .filter-group + .filter-group { padding-left: 0.65rem; border-left: 1px solid var(--avy-line-soft); }
  .filter-label {
    font-family: var(--font-display); font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-muted);
    margin-right: 0.1rem;
  }
  .chip {
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--avy-line); border-radius: 999px;
    background: transparent;
    font-family: var(--font-display); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.02em !important;
    color: var(--avy-muted); cursor: pointer;
    transition: all 160ms var(--ease);
  }
  .chip:hover { color: var(--avy-ink); border-color: rgba(17,19,21,0.22); }
  .chip.is-active { background: var(--avy-accent); color: var(--fg-invert); border-color: var(--avy-accent); }

  .search-wrap { margin-left: auto; position: relative; min-width: 280px; flex: 1; max-width: 360px; }
  .search {
    width: 100%; height: 32px; padding: 0 2.4rem 0 0.85rem;
    border: 1px solid var(--avy-line); border-radius: 8px;
    background: var(--avy-paper-solid);
    font-family: var(--font-body); font-size: 0.82rem; color: var(--avy-ink);
  }
  .search:focus { outline: none; border-color: rgba(30,102,66,0.45); box-shadow: 0 0 0 3px rgba(30,102,66,0.10); }
  .search-hint {
    position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 0.68rem; color: var(--avy-muted);
    padding: 0.1rem 0.35rem; border: 1px solid var(--avy-line); border-radius: 4px;
    background: rgba(255,255,255,0.6);
  }

  /* ---------- panel + table ---------- */
  .panel {
    background: var(--avy-paper); backdrop-filter: blur(10px);
    border: 1px solid var(--avy-line); border-radius: 10px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .panel__head { display: flex; justify-content: space-between; align-items: baseline; padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--avy-line-soft); }
  .panel__title { font-family: var(--font-display); font-weight: 700; font-size: 0.98rem; margin: 0; }
  .panel__sub { font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted); }

  .tbl { width: 100%; border-collapse: collapse; font-family: var(--font-body); font-size: 0.82rem; }
  .tbl th {
    text-align: left; font-family: var(--font-display); font-size: 0.64rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-muted);
    padding: 0.65rem 1.1rem; border-bottom: 1px solid var(--avy-line-soft);
    background: rgba(250, 248, 241, 0.6);
    white-space: nowrap;
  }
  .tbl td { padding: 0.8rem 1.1rem; border-bottom: 1px solid var(--avy-line-soft); vertical-align: middle; }
  .tbl tbody tr { cursor: pointer; transition: background-color 140ms var(--ease); }
  .tbl tbody tr:hover { background: rgba(255, 255, 255, 0.5); }
  .tbl tbody tr.is-open { background: rgba(30,102,66,0.06); }
  .tbl tbody tr:last-child td { border-bottom: none; }

  .handle { font-family: var(--font-body); font-weight: 600; color: var(--avy-ink); font-size: 0.88rem; line-height: 1.2; }
  .wallet-mono { font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted); margin-top: 2px; display: block; }

  .rep { display: flex; align-items: center; gap: 0.5rem; }
  .rep__num { font-family: var(--font-mono); font-size: 0.86rem; color: var(--avy-ink); font-variant-numeric: tabular-nums; font-weight: 600; min-width: 2.6rem; }

  .badges { display: flex; align-items: center; gap: 3px; }
  .badge-chip {
    width: 22px; height: 22px; border-radius: 6px;
    display: grid; place-items: center;
    font-family: var(--font-display); font-size: 0.58rem; font-weight: 800;
    letter-spacing: 0.04em !important;
    border: 1px solid var(--avy-line);
    background: var(--avy-paper-solid);
    color: var(--avy-muted);
    cursor: default;
  }
  .badge-chip.code { background: #d6eadf; color: #1e6642; border-color: rgba(30,102,66,0.25); }
  .badge-chip.write{ background: #e6e2f0; color: #4a3f7a; border-color: rgba(74,63,122,0.22); }
  .badge-chip.ops  { background: #f1d8b8; color: #7a4a18; border-color: rgba(167,97,34,0.30); }
  .badge-chip.gov  { background: #d8e6f0; color: #2a4a6a; border-color: rgba(42,74,106,0.25); }
  .badge-more { font-family: var(--font-mono); font-size: 0.7rem; color: var(--avy-muted); margin-left: 4px; }

  .stake { text-align: right; font-family: var(--font-mono); font-size: 0.82rem; color: var(--avy-ink); font-variant-numeric: tabular-nums; }
  .stake .lock {
    display: block; font-size: 0.68rem; color: var(--avy-muted); margin-top: 2px;
  }
  .stake .lock.hot { color: var(--avy-warn); }

  .activity .msg { color: var(--avy-ink); font-size: 0.82rem; line-height: 1.3; }
  .activity .msg .mref { font-family: var(--font-mono); color: var(--avy-accent); }
  .activity .when { font-family: var(--font-mono); font-size: 0.7rem; color: var(--avy-muted); margin-top: 2px; display: block; }

  .pill { display: inline-flex; align-items: center; gap: 0.4rem; min-height: 1.45rem; padding: 0 0.6rem; border-radius: 999px; font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; letter-spacing: 0.08em !important; text-transform: uppercase; }
  .pill--ok      { background: var(--avy-accent-soft); color: var(--avy-accent); }
  .pill--warn    { background: var(--avy-warn-soft);   color: var(--avy-warn); }
  .pill--bad     { background: #f3d9d9; color: #8a2a2a; }
  .pill--neutral { background: #ebe7da; color: #756d58; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.8; }

  .empty-cell { color: var(--avy-muted); font-family: var(--font-mono); font-size: 0.78rem; }

  /* ---------- legend ---------- */
  .legend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  .legend {
    padding: 0.9rem 1rem;
    border: 1px solid var(--avy-line); border-radius: 10px;
    background: rgba(255,253,247,0.7);
  }
  .legend__head {
    font-family: var(--font-display); font-size: 0.66rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-accent);
    margin-bottom: 0.45rem;
  }
  .legend__title { font-family: var(--font-display); font-weight: 700; font-size: 0.92rem; margin: 0 0 0.25rem; }
  .legend__body { font-family: var(--font-body); font-size: 0.8rem; color: var(--avy-muted); line-height: 1.5; }
  .legend__body code { font-family: var(--font-mono); font-size: 0.76rem; background: rgba(17,19,21,0.06); padding: 0 0.3rem; border-radius: 4px; color: var(--avy-ink); }

  /* ---------- footer ---------- */
  .tbl-footer {
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    padding: 0.65rem 1.1rem; border-top: 1px solid var(--avy-line-soft);
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted);
    background: rgba(250, 248, 241, 0.5);
  }

  /* ---------- drawer ---------- */
  .drawer-scrim {
    position: fixed; inset: 0; background: rgba(17,19,21,0.18);
    z-index: 40; opacity: 0; pointer-events: none; transition: opacity 200ms var(--ease);
  }
  .drawer-scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: min(560px, 96vw);
    background: var(--avy-bg);
    border-left: 1px solid var(--avy-line);
    box-shadow: -24px 0 60px rgba(17,19,21,0.12);
    z-index: 50;
    transform: translateX(100%);
    transition: transform 220ms var(--ease);
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer__head {
    padding: 1.1rem 1.3rem 0.9rem;
    border-bottom: 1px solid var(--avy-line-soft);
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .drawer__close {
    position: absolute; top: 1rem; right: 1rem;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--avy-line); background: var(--avy-paper-solid);
    display: grid; place-items: center; cursor: pointer;
    font-family: var(--font-mono); font-size: 0.9rem; color: var(--avy-muted);
  }
  .drawer__close:hover { color: var(--avy-ink); }
  .drawer__eyebrow {
    font-family: var(--font-display); font-size: 0.62rem; font-weight: 800;
    letter-spacing: 0.14em !important; text-transform: uppercase; color: var(--avy-accent);
  }
  .drawer__handle { font-family: var(--font-display); font-weight: 700; font-size: 1.35rem; margin: 0; }
  .drawer__wallet { font-family: var(--font-mono); font-size: 0.82rem; color: var(--avy-accent); word-break: break-all; }
  .drawer__chips { display: flex; gap: 0.45rem; align-items: center; margin-top: 0.2rem; }
  .drawer__score {
    font-family: var(--font-mono); font-size: 0.78rem; color: var(--avy-muted);
  }
  .drawer__score b { color: var(--avy-ink); font-weight: 600; }

  .drawer__body { flex: 1; overflow-y: auto; padding: 1.1rem 1.3rem 2rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .dsect { display: flex; flex-direction: column; gap: 0.5rem; }
  .dsect__head {
    font-family: var(--font-display); font-size: 0.66rem; font-weight: 800;
    letter-spacing: 0.14em !important; text-transform: uppercase; color: var(--avy-muted);
    display: flex; align-items: center; gap: 0.55rem;
  }
  .dsect__head::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--avy-accent); }

  .sign-block {
    border: 1px solid rgba(30,102,66,0.24);
    background: rgba(30,102,66,0.06);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    display: flex; flex-direction: column; gap: 0.45rem;
  }
  .sign-block__title {
    font-family: var(--font-display); font-size: 0.66rem; font-weight: 800;
    letter-spacing: 0.12em !important; text-transform: uppercase; color: var(--avy-accent);
  }
  .sign-block__wallet { font-family: var(--font-mono); font-size: 0.82rem; color: var(--avy-accent); word-break: break-all; }
  .sign-block__link {
    font-family: var(--font-mono); font-size: 0.74rem; color: var(--avy-ink);
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.3rem 0.55rem; border: 1px solid var(--avy-line);
    background: var(--avy-paper-solid); border-radius: 6px;
    align-self: flex-start; cursor: pointer;
  }
  .sign-block__link:hover { border-color: rgba(30,102,66,0.35); color: var(--avy-accent); }

  .rep-panel {
    border: 1px solid var(--avy-line); border-radius: 10px; padding: 0.9rem 1rem;
    background: var(--avy-paper-solid);
    display: grid; gap: 0.7rem;
  }
  .rep-panel__top { display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem; }
  .rep-panel__score {
    font-family: var(--font-display); font-weight: 700; font-size: 2.1rem; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .rep-panel__score .tier-chip { vertical-align: super; font-size: 0.56rem; margin-left: 0.4rem; }
  .rep-panel__meta { font-family: var(--font-mono); font-size: 0.72rem; color: var(--avy-muted); }
  .tier-ladder { display: grid; gap: 0.35rem; }
  .tier-ladder__row {
    display: grid; grid-template-columns: 2.5rem 1fr auto; gap: 0.7rem; align-items: center;
    font-family: var(--font-mono); font-size: 0.74rem; color: var(--avy-muted);
  }
  .tier-ladder__row .bar { height: 6px; border-radius: 3px; background: rgba(17,19,21,0.08); overflow: hidden; }
  .tier-ladder__row .bar > span { display: block; height: 100%; background: var(--avy-accent); }
  .tier-ladder__row.cur { color: var(--avy-ink); font-weight: 600; }
  .tier-ladder__row.next .bar > span { background: rgba(30,102,66,0.35); }

  .badge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.55rem; }
  .badge-card {
    border: 1px solid var(--avy-line); border-radius: 8px;
    padding: 0.6rem 0.75rem; background: var(--avy-paper-solid);
    display: grid; grid-template-columns: 28px 1fr; gap: 0.6rem; align-items: center;
  }
  .badge-card__glyph {
    width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center;
    font-family: var(--font-display); font-size: 0.64rem; font-weight: 800;
    letter-spacing: 0.04em !important;
  }
  .badge-card__glyph.code { background: #d6eadf; color: #1e6642; }
  .badge-card__glyph.write{ background: #e6e2f0; color: #4a3f7a; }

/* ========== sparkline ========== */
function Spark({ data, width=88, height=22, stroke="var(--avy-accent)" }) {
  const min = Math.min(...data);
  const max = Math.max(...data);
  const rng = Math.max(1, max - min);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * (width - 2) + 1;
    const y = height - 2 - ((v - min) / rng) * (height - 4);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg className="spark" viewBox={`0 0 ${width} ${height}`} width={width} height={height} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

/* ========== clock + block ========== */
function LiveClock() {
  const [now, setNow] = useState(() => new Date(Date.UTC(2026, 3, 24, 14, 8, 24)));
  const [block, setBlock] = useState(20414788);
  useEffect(() => {
    const id = setInterval(() => {
      setNow(n => new Date(n.getTime() + 1000));
      setBlock(b => b + 1);
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const hh = String(now.getUTCHours()).padStart(2,"0");
  const mm = String(now.getUTCMinutes()).padStart(2,"0");
  const ss = String(now.getUTCSeconds()).padStart(2,"0");
  return (
    <div className="clock" title="Live UTC clock + Polkadot block height">
      <span className="live-dot"></span>
      <span>{hh}:{mm}:{ss} UTC</span>
      <span className="sep">·</span>
      <span className="block">#{block.toLocaleString()}</span>
    </div>
  );
}

      <div className="topbar__right">
        <LiveClock />
        <button className="btn btn--ghost">⤓ Export roster</button>
        <button className="btn btn--primary">＋ Invite agent</button>
      </div>
    </header>
  );
}

/* ========== aggregate strip ========== */
function Aggregates({ agents }) {
  const active = agents.filter(a => a.state === "active").length;
  const claimed24h = 23; // static — "roster is deterministic for the page"
  const claim24Spark = [1,2,0,3,2,4,3,2,5,1,0,0];
  const avgRep = Math.round(agents.reduce((s,a) => s + a.score, 0) / agents.length);
  const slashed30 = agents.filter(a => a.state === "slashed").length;

  return (
    <div className="aggregates">
      <div className="agg">
        <div className="agg__head">
          <span className="agg__lbl">Active agents</span>
        </div>
        <span className="agg__val">{active}<span className="unit">/ {agents.length}</span></span>
        <span className={`agg__meta ${active < 3 ? 'warn' : 'ok'}`}>
          <span className="dot" style={{width:6,height:6,borderRadius:"50%",background:"currentColor",display:"inline-block"}}></span>
          {active < 3 ? "below healthy floor" : "healthy roster"}
        </span>
      </div>
      <div className="agg">
        <div className="agg__head">
          <span className="agg__lbl">Claimed 24h</span>
          <Spark data={claim24Spark} width={72} height={20} />
        </div>
        <span className="agg__val">{claimed24h}<span className="unit">runs</span></span>
        <span className="agg__meta ok">+4 vs prior 24h</span>
      </div>
      <div className="agg">
        <div className="agg__head">
          <span className="agg__lbl">Avg reputation</span>
          <span className="tier-chip">{tierFor(avgRep)}</span>
        </div>
        <span className="agg__val" style={{fontFamily:"var(--font-mono)"}}>{avgRep}</span>
        <span className="agg__meta ok">across 8 agents · 14d trend up</span>
      </div>
      <div className="agg">
        <div className="agg__head">
          <span className="agg__lbl">Slashed 30d</span>
        </div>
        <span className="agg__val" style={{color: slashed30 > 0 ? "#8a2a2a" : "var(--avy-ink)"}}>{slashed30}</span>
        <span className={`agg__meta ${slashed30 > 0 ? 'bad' : 'ok'}`}>
          {slashed30 > 0 ? `${slashed30} event · 45 DOT total` : "clean record"}
        </span>
      </div>
    </div>
  );
}

/* ========== filter rail ========== */
function FilterRail({ tier, setTier, status, setStatus, specialty, setSpecialty, query, setQuery }) {
  const inputRef = useRef(null);
  useEffect(() => {
    const h = (e) => {
      if (e.key === "/" && document.activeElement !== inputRef.current) {
        e.preventDefault();
        inputRef.current && inputRef.current.focus();
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const Chip = ({ val, cur, set, children }) => (
    <button className={`chip ${cur === val ? 'is-active' : ''}`} onClick={() => set(val)}>{children}</button>
  );

  return (
    <div className="filter-rail">
      <div className="filter-group">
        <span className="filter-label">Tier</span>
        <Chip val="all" cur={tier} set={setTier}>All</Chip>
        <Chip val="T1" cur={tier} set={setTier}>T1</Chip>
        <Chip val="T2" cur={tier} set={setTier}>T2</Chip>
        <Chip val="T3" cur={tier} set={setTier}>T3</Chip>
      </div>
      <div className="filter-group">
        <span className="filter-label">Status</span>
        <Chip val="all" cur={status} set={setStatus}>All</Chip>
        <Chip val="active" cur={status} set={setStatus}>Active</Chip>
        <Chip val="idle" cur={status} set={setStatus}>Idle</Chip>
        <Chip val="slashed" cur={status} set={setStatus}>Slashed</Chip>
      </div>
      <div className="filter-group">
        <span className="filter-label">Specialty</span>
        <Chip val="all" cur={specialty} set={setSpecialty}>All</Chip>
        <Chip val="coding" cur={specialty} set={setSpecialty}>Coding</Chip>
        <Chip val="writer-gov" cur={specialty} set={setSpecialty}>Writer-gov</Chip>
        <Chip val="ops" cur={specialty} set={setSpecialty}>Ops</Chip>
        <Chip val="gov-review" cur={specialty} set={setSpecialty}>Gov-review</Chip>
      </div>
      <div className="search-wrap">
        <input
          ref={inputRef}
          className="search"
          placeholder="Filter by wallet, handle, badge, policy…"
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
        <span className="search-hint">/</span>
      </div>
    </div>
  );
}

/* ========== agent row ========== */
function AgentRow({ agent, open, onOpen }) {
  const visible = agent.badges.slice(0, 3);
  const extra = agent.badges.length - visible.length;
  const lockPct = agent.stake.locked / agent.stake.deposited;
  const hot = lockPct > 0.8;
  const statePill = {
    active:  { cls: "pill--ok",      label: "Active"  },
    idle:    { cls: "pill--neutral", label: "Idle"    },
    slashed: { cls: "pill--bad",     label: "Slashed" },
  }[agent.state];

  return (
    <tr className={open ? "is-open" : ""} onClick={onOpen}>
      <td>
        <span className="handle">{agent.handle}</span>
        <span className="wallet-mono">{agent.wallet}</span>
      </td>
      <td>
        <span className="tier-chip">{agent.tier}</span>
      </td>
      <td>
        <div className="rep">
          <span className="rep__num">{agent.score}</span>
          <Spark data={agent.sparkline} width={72} height={20} />
        </div>
      </td>
      <td>
        <div className="badges" title={agent.badges.map(b => BADGES[b].name).join(", ")}>
          {visible.map(b => {
            const m = BADGES[b];
            return <span key={b} className={`badge-chip ${spColor(m.specialty)}`} title={m.name}>{m.glyph}</span>;
          })}
          {extra > 0 && <span className="badge-more">+{extra}</span>}
        </div>
      </td>
      <td className="stake">
        {agent.stake.deposited.toFixed(0)} DOT
        <span className={`lock ${hot ? 'hot' : ''}`}>
          {agent.stake.locked} locked · {Math.round(lockPct*100)}%
        </span>
      </td>
      <td className="activity">
        <span className="msg">
          {agent.activity.msg.split(agent.activity.ref).map((s,i,arr) =>
            <React.Fragment key={i}>{s}{i < arr.length - 1 ? <span className="mref">{agent.activity.ref}</span> : null}</React.Fragment>
          )}
        </span>
        <span className="when">{agent.activity.when}</span>
      </td>
      <td>
        <span className={`pill ${statePill.cls}`}><span className="dot"></span>{statePill.label}</span>
      </td>
    </tr>
  );
}

/* ========== drawer ========== */
function Drawer({ agent, onClose }) {
  const open = !!agent;
  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);

  if (!agent) {
    return (
      <>
        <div className="drawer-scrim" onClick={onClose}></div>
        <aside className="drawer"></aside>
      </>
    );
  }

  const lockPct = agent.stake.locked / agent.stake.deposited;
  const tiers = [
    { id: "T1", lo: 0,   hi: 300 },
    { id: "T2", lo: 300, hi: 800 },
    { id: "T3", lo: 800, hi: 1000 },
  ];
  const curTier = tierFor(agent.score);
  const next = nextThreshold(agent.score);
  const profileUrl = `averray.com/agents/${agent.walletFull}`;

  return (
    <>
      <div className={`drawer-scrim ${open ? 'open' : ''}`} onClick={onClose}></div>
      <aside className={`drawer ${open ? 'open' : ''}`}>
        <header className="drawer__head">
          <button className="drawer__close" onClick={onClose} aria-label="Close">×</button>
          <span className="drawer__eyebrow">Agent · worker wallet</span>
          <h2 className="drawer__handle">{agent.handle}</h2>
          <span className="drawer__wallet">{agent.walletFull}</span>
          <div className="drawer__chips">
            <span className="tier-chip">{agent.tier}</span>
            <span className="drawer__score">score <b>{agent.score}</b></span>
            <span className="drawer__score">· specialty <b>{agent.specialty}</b></span>
          </div>
        </header>

        <div className="drawer__body">
          {/* signature header */}
          <section className="dsect">
            <div className="dsect__head">Signature header</div>
            <div className="sign-block">
              <span className="sign-block__title">Public identity</span>
              <span className="sign-block__wallet">{agent.walletFull}</span>
              <a className="sign-block__link" href={`https://${profileUrl}`} target="_blank" rel="noreferrer">
                <span>↗</span><span>{profileUrl}</span>
              </a>
            </div>
          </section>

          {/* reputation */}
          <section className="dsect">
            <div className="dsect__head">Reputation · 30d</div>
            <div className="rep-panel">
              <div className="rep-panel__top">
                <div>
                  <div className="rep-panel__score">
                    {agent.score}<span className="tier-chip">{agent.tier}</span>
                  </div>
                  <div className="rep-panel__meta">
                    {next ? `+${next - agent.score} to ${tierFor(next)}` : "top tier — no further ladder"}
                  </div>
                </div>
                <Spark data={agent.sparkline} width={160} height={34} />
              </div>
              <div className="tier-ladder">
                {tiers.map(t => {
                  const isCur = t.id === curTier;
                  const pct = Math.max(0, Math.min(1, (agent.score - t.lo) / (t.hi - t.lo))) * 100;
                  return (
                    <div key={t.id} className={`tier-ladder__row ${isCur ? 'cur' : ''}`}>
                      <span>{t.id}</span>
                      <div className="bar"><span style={{width: `${pct}%`}}></span></div>
                      <span>{t.lo}–{t.hi === 1000 ? "∞" : t.hi}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* badges */}
          <section className="dsect">
            <div className="dsect__head">Badges earned · {agent.badges.length}</div>
            <div className="badge-grid">
              {agent.badges.map(b => {
                const m = BADGES[b];
                return (
                  <div key={b} className="badge-card">
                    <span className={`badge-card__glyph ${spColor(m.specialty)}`}>{m.glyph}</span>
                    <div>
                      <div className="badge-card__name">{m.name}</div>
                      <div className="badge-card__meta">issued {agent.badgeDates[b] || "—"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* recent runs */}
          <section className="dsect">
            <div className="dsect__head">Recent runs · last 8</div>
            <div className="runs-list">
              {agent.recentRuns.map(r => {
                const pillCls = r.state === "Verified" ? "pill--ok" : r.state === "Disputed" ? "pill--warn" : "pill--neutral";
                return (
                  <div className="run-row" key={r.id}>
                    <div className="run-row__title">
                      {r.title}
                      <span className="sub">{r.id}</span>
                    </div>
                    <span className="run-row__receipt">{r.receipt}</span>
                    <span className={`pill ${pillCls}`}><span className="dot"></span>{r.state}</span>
                  </div>
                );
              })}
            </div>
          </section>

          {/* stake panel */}
          <section className="dsect">
            <div className="dsect__head">Stake</div>
            <div className="stake-grid">
              <div className="stake-cell">
                <span className="stake-cell__lbl">Deposited</span>
                <span className="stake-cell__val">{agent.stake.deposited} DOT</span>
              </div>
              <div className={`stake-cell ${lockPct > 0.8 ? 'warn' : ''}`}>
                <span className="stake-cell__lbl">Locked</span>
                <span className="stake-cell__val">{agent.stake.locked} DOT</span>
              </div>
              <div className="stake-cell">
                <span className="stake-cell__lbl">Available</span>
                <span className="stake-cell__val">{agent.stake.available} DOT</span>
              </div>
              <div className={`stake-cell ${agent.stake.slashed30 > 0 ? 'bad' : ''}`}>
                <span className="stake-cell__lbl">Slashed 30d</span>
                <span className="stake-cell__val">{agent.stake.slashed30} DOT</span>
              </div>
            </div>
          </section>

          {/* slash timeline */}
          <section className="dsect">
            <div className="dsect__head">Slash events</div>
            {agent.slashes.length === 0 ? (
              <div className="empty-state">No slashes on record — clean history since claim-open.</div>
            ) : (
              <div className="slash-tl">
                {agent.slashes.map((s, i) => (
                  <div className="slash-tl__row" key={i}>
                    <span className="slash-tl__dot"></span>
                    <div>
                      <div className="slash-tl__msg"><b>{s.amount}</b> — {s.reason}</div>
                      <span className="slash-tl__sub">receipt {s.ref}</span>
                    </div>
                    <span className="slash-tl__when">{s.when}</span>
                  </div>
                ))}
              </div>
            )}
          </section>

          {/* profile link out */}
          <section className="dsect">
            <div className="dsect__head">Public profile</div>
            <a className="profile-link" href={`https://${profileUrl}`} target="_blank" rel="noreferrer">
              <span>↗</span>
              <span>https://{profileUrl}</span>
              <span className="arrow">open</span>
            </a>
          </section>
        </div>
      </aside>
    </>
  );
}

/* ========== main ========== */
function Page() {
  const [tier, setTier] = useState("all");
  const [status, setStatus] = useState("all");
  const [specialty, setSpecialty] = useState("all");
  const [query, setQuery] = useState("");
  const [openId, setOpenId] = useState(null);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return AGENTS.filter(a => {
      if (tier !== "all" && a.tier !== tier) return false;
      if (status !== "all" && a.state !== status) return false;
      if (specialty !== "all" && a.specialty !== specialty) return false;
      if (q) {
        const badgeText = a.badges.map(b => BADGES[b].name).join(" ").toLowerCase();
        const blob = `${a.handle} ${a.wallet} ${a.walletFull} ${a.specialty} ${badgeText} ${a.activity.msg}`.toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });
  }, [tier, status, specialty, query]);

  const openAgent = openId ? AGENTS.find(a => a.handle === openId) : null;

  return (
    <div className="shell">
      <Rail />
      <div className="canvas-wrap">
        <div className="canvas">
          <Topbar />

          <div className="page-header">
            <span className="page-eyebrow">Workforce</span>
            <h1 className="page-title">Agents</h1>
            <p className="page-lede">Every wallet doing work — one trail, one reputation. This roster is the same identity a counterparty reads at averray.com/agents before deciding to hire.</p>
          </div>

          <Aggregates agents={AGENTS} />

          <FilterRail
            tier={tier} setTier={setTier}
            status={status} setStatus={setStatus}
            specialty={specialty} setSpecialty={setSpecialty}
            query={query} setQuery={setQuery}
          />

          <div className="panel">
            <div className="panel__head">
              <h3 className="panel__title">Agent directory</h3>
              <span className="panel__sub">default sort · last active</span>
            </div>
            <table className="tbl">
              <thead>
                <tr>
                  <th>Handle / wallet</th>
                  <th>Tier</th>
                  <th>Reputation</th>
                  <th>Badges</th>
                  <th style={{textAlign:"right"}}>Stake</th>
                  <th>Recent activity</th>
                  <th>State</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan="7" className="empty-cell" style={{padding:"2rem", textAlign:"center"}}>No agents match these filters.</td></tr>
                ) : filtered.map(a => (
                  <AgentRow
                    key={a.handle}
                    agent={a}
                    open={openId === a.handle}
                    onOpen={() => setOpenId(a.handle)}
                  />
                ))}
              </tbody>
            </table>
            <div className="tbl-footer">
              <span>Showing {filtered.length} of {AGENTS.length} · all agents visible</span>
              <button className="btn btn--primary" style={{height: 28, fontSize: "0.68rem"}}>＋ Invite new agent</button>
            </div>
          </div>

          <div className="legend-grid">
            <div className="legend">
              <div className="legend__head">Tier ladder</div>
              <div className="legend__title">How tiers are assigned</div>
              <p className="legend__body">Tier tracks reputation: <code>T1 &lt; 300</code>, <code>T2 300–800</code>, <code>T3 &gt; 800</code>. Promotions happen automatically when a receipt pushes score across a threshold — not here.</p>
            </div>
            <div className="legend">
              <div className="legend__head">Reputation</div>
              <div className="legend__title">Where the score comes from</div>
              <p className="legend__body">Each verified receipt adds points. Each dispute upheld against the agent subtracts points. The 14d sparkline in each row is raw, not smoothed.</p>
            </div>
            <div className="legend">
              <div className="legend__head">Slash causes</div>
              <div className="legend__title">What triggers a slash</div>
              <p className="legend__body">Stake is slashed when a handoff signature fails to verify, a claim is abandoned after lock, or a dispute is upheld. Slashes cite a receipt and appear on the public profile.</p>
            </div>
          </div>
        </div>
      </div>

      <Drawer agent={openAgent} onClose={() => setOpenId(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Page />);
</script>
</body>
</html>
