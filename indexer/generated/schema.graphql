"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ViewPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Meta {
  status: JSON
}

type Query {
  job(id: String!): job
  jobs(where: jobFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): jobPage!
  jobEvent(id: String!): jobEvent
  jobEvents(where: jobEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): jobEventPage!
  payout(id: String!): payout
  payouts(where: payoutFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): payoutPage!
  badgeMint(id: String!): badgeMint
  badgeMints(where: badgeMintFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): badgeMintPage!
  reputationSnapshot(id: String!): reputationSnapshot
  reputationSnapshots(where: reputationSnapshotFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): reputationSnapshotPage!
  treasuryOutflow(id: String!): treasuryOutflow
  treasuryOutflows(where: treasuryOutflowFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): treasuryOutflowPage!
  _meta: Meta
}

