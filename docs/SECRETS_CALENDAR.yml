# Secrets Calendar — declarative source of truth for token expiry tracking
#
# Read by `scripts/ops/check-secrets-calendar.mjs`, which warns when
# any tracked token's `expires_at` is within 7 days of now and fails
# CI when an entry is past expiry.
#
# Each entry should describe a secret whose lifetime is bounded by an
# external system (vendor token expiry, GitHub PAT scope, etc.) and
# therefore needs proactive rotation. Long-lived secrets without a
# vendor expiry don't need entries here — they're tracked by
# rotation-on-incident, not by calendar.
#
# Field reference
# ---------------
#   name          (required)  Stable identifier; matches the 1Password
#                             item name when possible.
#   description   (required)  One-liner: what the token unlocks.
#   owner         (required)  Who's responsible for rotating it.
#   vault_path    (optional)  op:// reference to the 1Password item.
#   expires_at    (required)  ISO date when the token expires.
#                             ISO format: YYYY-MM-DD.
#   warn_days     (optional)  Override the global 7-day warning window.
#   notes         (optional)  Anything else worth knowing at rotation
#                             time.

entries:

  # ── GitHub Actions secrets ─────────────────────────────────────────

  - name: ADMIN_JWT
    description: Long-lived admin JWT used by hosted product-proof smoke and ops scripts. TRANSITIONAL — replaced by short-lived asymmetric JWTs in Phase 4b.
    owner: deployer
    vault_path: op://prod-smoke/admin-jwt
    expires_at: "2026-06-12"   # 30 days after the verifier-role re-mint on 2026-05-13
    warn_days: 7
    notes: |
      Mint a fresh one, capture into a shell variable, store in
      1Password AND update the GH Actions secret (until PR 2.5
      wires the smoke workflow to read from 1Password directly):

        NEW_JWT=$(AUTH_JWT_SECRETS=$(op read "op://prod-backend/auth-jwt-secrets/password") \
          node scripts/ops/mint-admin-jwt.mjs --profile testnet --expires-in-days 30 --quiet)

        op item create --vault=prod-smoke --category=password --title=admin-jwt \
          "password=$NEW_JWT" "notes=..."
        printf '%s' "$NEW_JWT" | gh secret set ADMIN_JWT -R averray-agent/agent
        unset NEW_JWT

      Then update this entry's `expires_at`. Use `--profile testnet`
      while the production system targets Polkadot Hub TestNet;
      switch to `--profile mainnet` once Phase 5 cutover provisions
      `deployments/mainnet.json`. (Earlier v3 docs referenced
      `--profile production` — that profile name doesn't match any
      real `deployments/*.json` file; corrected in Phase 2 PR 2.1.)

      This entry is **transitional**. Phase 4b (asymmetric JWTs
      signed by KMS) makes the long-lived admin JWT obsolete —
      the smoke loop will mint a short-lived JWT (≤15 min) per
      run from a CI OIDC → KMS signing path, and this calendar
      entry can be retired. Track that in
      SECRETS_INTEGRATION_PLAN.md Phase 4b.

  # ── External service tokens (placeholder values — fill in real
  #    expiry dates after migration to 1Password) ─────────────────────

  - name: github-pat-issue-ingestion
    description: GitHub fine-grained PAT (or GitHub App installation token) used by the GitHub issue ingestor.
    owner: deployer
    vault_path: op://Averray/Production/CIExternal/github-pat
    expires_at: "TBD"   # Set after rotation; GitHub PATs typically default to 90d
    warn_days: 7
    notes: |
      Rotate at https://github.com/settings/tokens.
      Prefer a **fine-grained PAT** restricted to the SINGLE repo
      that holds the issue ingestion target, with the minimum
      permissions: `Issues: Read` (and `Issues: Write` only if the
      ingestor closes/comments). DO NOT use a classic PAT with
      `repo`/`read:org`/`workflow` — those scopes are far broader
      than needed. For >1 repo or longer-lived needs, prefer a
      GitHub App installation token over any PAT.

  - name: pimlico-api-key
    description: Pimlico bundler / paymaster credentials for ERC-4337 sponsorship.
    owner: deployer
    vault_path: op://Averray/Production/BackendExternal/pimlico
    expires_at: "TBD"   # Pimlico keys don't auto-expire; treat as 90d rotation policy
    warn_days: 14
    notes: |
      Rotate at https://dashboard.pimlico.io/. Update both bundler and
      paymaster URLs together — they share the same API key.

  - name: subscan-api-key
    description: Subscan API key for XCM observation.
    owner: deployer
    vault_path: op://Averray/Production/BackendExternal/subscan
    expires_at: "TBD"   # Subscan: vendor cycle, treat as 90d rotation
    warn_days: 14
    notes: |
      Rotate at https://subscan.io/api. The staging-tier key has a
      lower rate limit; the production tier requires email request.

  - name: resend-api-key
    description: Resend.com API key for bootstrap self-report and alert emails.
    owner: operator
    vault_path: op://prod-backend-external/resend-api-key
    expires_at: "2026-08-11"   # 90 days after Phase 2 PR 2.7d rotation on 2026-05-13
    warn_days: 14
    notes: |
      Rotate at https://resend.com/api-keys. Token name: `averray-prod`.
      The backend self-report key lives in prod-backend-external. If CI
      also needs to send mail (e.g. a deploy notifier), mint a SEPARATE
      token in prod-ci-external so a leaked backend token can't send
      "from CI" and vice versa.
      Last rotated 2026-05-13 (Phase 2 PR 2.7d, after operator accidentally
      pasted the key into chat). The post-rotation deploy used Phase 2
      PR 2.7d.1's env-content-aware force-recreate to pick up the new
      value with zero SSH touches.

  - name: sentry-dsn
    description: Sentry project DSN for error telemetry.
    owner: deployer
    vault_path: op://Averray/Production/BackendExternal/sentry-dsn
    expires_at: "never"   # Sentry DSNs are project-lifetime; flag if rotated
    notes: |
      Sentry DSNs don't have an expiry; this entry exists so the
      check script confirms it's still in the inventory. Rotate via
      project settings if compromise is suspected.

  # ── 1Password service account tokens (split per runtime) ──────────
  #
  # Revised in v2 per security review: one token per runtime per
  # environment, each scoped to a single vault.

  # Service-account tokens are stored in a SHARED, human-only vault
  # (Averray/Production/Critical) — NOT in any operator's Personal
  # vault. 1Password's docs also note service accounts cannot be
  # granted access to built-in Personal vaults, so Personal vault
  # references are operationally fragile for team continuity.
  # Critical is human-only and explicitly NOT readable by any
  # runtime service account.

  - name: op-token-prod-ci-deploy
    description: 1Password service account token for GitHub Actions production deploy workflow.
    owner: deployer
    vault_path: op://Averray/Production/Critical/op-token-prod-ci-deploy
    expires_at: "TBD"   # Set when token provisioned; ≤90d cadence
    warn_days: 14
    notes: |
      Scoped read-only to Averray/Production/CI + CIExternal vaults
      (deploy-time credentials only, no backend runtime secrets).
      Rotate in 1Password admin: Integrations → Service Accounts →
      New (scope is effectively immutable post-create — mint a new
      one rather than trying to widen). After rotation, update the
      GitHub Environment secret OP_SERVICE_ACCOUNT_TOKEN_PROD_CI.

  - name: op-token-prod-vps-backend
    description: 1Password service account token used by the backend VPS at deploy time.
    owner: deployer
    vault_path: op://Averray/Production/Critical/op-token-prod-vps-backend
    expires_at: "TBD"
    warn_days: 14
    notes: |
      Scoped read-only to the MINIMAL VAULT SET the backend needs at
      runtime: Averray/Production/Backend + BackendExternal.
      A leaked token reads those two vaults only — not Indexer, not
      CI, not Critical, not Smoke.
      After rotation, update /etc/agent-stack/op-backend.env on the
      VPS.

  - name: op-token-prod-vps-indexer
    description: 1Password service account token used by the indexer VPS at deploy time.
    owner: deployer
    vault_path: op://Averray/Production/Critical/op-token-prod-vps-indexer
    expires_at: "TBD"
    warn_days: 14
    notes: |
      Scoped read-only to Averray/Production/Indexer (single vault).
      After rotation, update /etc/agent-stack/op-indexer.env on the
      VPS.

  - name: op-token-prod-smoke-tests
    description: 1Password service account token used by hosted product-proof smoke.
    owner: deployer
    vault_path: op://Averray/Production/Critical/op-token-prod-smoke-tests
    expires_at: "TBD"
    warn_days: 14
    notes: |
      Scoped read-only to Averray/Production/Smoke (dedicated vault
      created specifically because 1Password does not support
      item-level scoping inside a vault — must be a whole-vault
      grant). The Smoke vault contains only the admin-jwt item.
      Smallest blast radius — leaked token can read the Smoke vault
      only.

  # ── AWS signer access (NOT static IAM keys) ───────────────────────
  #
  # Revised in v2: we no longer store long-lived AWS IAM access keys
  # for the signer principal. Access is via IAM Roles Anywhere
  # (X.509 client cert on the VPS) and GitHub OIDC (for any
  # Actions workflow that needs AWS). Both yield ≤1h temporary
  # credentials that rotate automatically.

  - name: aws-roles-anywhere-client-cert
    description: X.509 client cert on the VPS used by IAM Roles Anywhere to fetch temporary AWS credentials.
    owner: deployer
    # The calendar tracks the cert's PUBLIC metadata (issuer, SAN,
    # expiry) only. The private key NEVER goes into any 1Password
    # vault that a service account can read — that would break the
    # threat model (backend service token + cert+key = AWS temp
    # creds = kms:Sign capability).
    vault_path: op://Averray/Production/Critical/aws-roles-anywhere-cert-metadata
    expires_at: "TBD"   # 7-day rotation cadence for the self-managed CA path
    warn_days: 3        # 7-day cert => warn 3 days before expiry
    notes: |
      Reissue procedure (revised in v3 per security review,
      updated to self-managed CA as the default — see
      SECRETS_MIGRATION.md §3a cost summary for the rationale):
        1. Generate a new client keypair ON THE VPS (do not
           generate remotely and copy).
        2. Submit the CSR to our self-managed CA (CA private key
           lives in Averray/Production/Critical; human-only).
           Sign for a 7-day validity.
        3. Install the new cert at /etc/agent-stack/roles-anywhere/
           on the VPS (mode 0400, owner root).
        4. Update this calendar entry with the new expires_at.

      Automate steps 1–4 as a weekly cron on the VPS that triggers
      an SSH-out to the operator workstation for CA signing. The
      operator workstation prompts for the 1Password unlock and
      runs `openssl x509 -req` against the CA private key from
      Critical.

      What lives where:
        - Public certificate (PEM, metadata): Critical vault for
          audit + expiry tracking. Human-only access; service
          accounts cannot read Critical.
        - Client private key (per-VPS): VPS only. Generated on VPS.
          Never written to any vault readable by a service account.
          Optional emergency escrow in Averray/Production/Critical
          (human-only) is documented as residual risk in
          SECRETS_INTEGRATION_PLAN.md.
        - CA private key: Averray/Production/Critical, human-only
          (current default). Optional upgrade: YubiKey ($25 one-
          time) or AWS Private CA short-lived mode ($50/mo) — see
          SECRETS_MIGRATION.md §3a for when to upgrade.

  # The KMS SIGNER KEY itself is NOT calendar-tracked. Rotation of
  # the asymmetric KMS key is an on-chain signer migration event
  # (multisig calls setVerifier with the new key's derived address),
  # not a routine calendar rotation. AWS does not support automatic
  # rotation for asymmetric KMS keys. See SECRETS.md and Phase 3 of
  # SECRETS_MIGRATION.md for the migration procedure.

  # ── VPS SSH key ───────────────────────────────────────────────────

  - name: vps-ssh-key
    description: ED25519 private key used by GitHub Actions to SSH into the VPS.
    owner: deployer
    vault_path: op://prod-ci/vps-ssh-key
    expires_at: "2026-11-13"   # 6 months after Phase 2 PR 2.7d rotation on 2026-05-13
    warn_days: 30
    notes: |
      Mint with `ssh-keygen -t ed25519 -f ~/.ssh/averray_deploy_<date>`.
      Add the public key to /root/.ssh/authorized_keys on the VPS,
      update 1Password (both `private key` and `public key` fields),
      redeploy once, then remove the old public key from
      authorized_keys after 24h.
      Last rotated 2026-05-13 (Phase 2 PR 2.7d). Two-key window means
      both keys are live during the 24h post-rotation period —
      authorized_keys.bak holds the old pubkey for emergency rollback.

  # ── App basic-auth (operator dashboard / staging gate) ────────────

  - name: app-basic-auth
    description: HTTP basic-auth credentials gating the operator dashboard. User=averray; password rotated 90d.
    owner: deployer
    vault_path: op://prod-critical/app-basic-auth
    expires_at: "2026-08-11"   # 90 days after Phase 2 PR 2.7d rotation on 2026-05-13
    warn_days: 14
    notes: |
      Two fields are kept in sync across two vaults:
        - op://prod-critical/app-basic-auth/password  (plaintext for humans)
        - op://prod-ci/app-basic-auth-hash/credential (bcrypt cost-12 for Caddy)
      Rotation procedure:
        NEW_PW=$(openssl rand -base64 24 | tr -d /+=)
        NEW_HASH=$(htpasswd -bnB -C 12 "" "$NEW_PW" | cut -d: -f2)
        op item edit app-basic-auth --vault=prod-critical "password=$NEW_PW"
        op item edit app-basic-auth-hash --vault=prod-ci "credential=$NEW_HASH"
        gh workflow run deploy-production.yml
      Phase 2 PR 2.7d.2 (Caddyfile auto-detect) picks up the new hash
      without an SSH touch.

  # ── AUTH_JWT_SECRETS (HMAC keyring for SIWE sessions) ─────────────

  - name: auth-jwt-secrets
    description: HMAC-SHA256 secret keyring (comma-separated, newest-first) used to sign + verify SIWE session JWTs and ADMIN_JWT.
    owner: deployer
    vault_path: op://prod-backend/auth-jwt-secrets
    expires_at: "2026-08-11"   # 90 days after Phase 2 PR 2.7d rotation on 2026-05-13
    warn_days: 14
    notes: |
      One of the four highest-risk items in SECRETS.md — a vault leak
      OR a backend env leak means anyone can mint admin JWTs. Rotation
      cadence: 90d, or immediately on any suspected compromise.

      TWO-PHASE rotation. See SECRETS.md §AUTH_JWT_SECRETS for the
      full runbook. Today the canonical procedure is:

        Phase A (Day 0):
          NEW_HEX=$(openssl rand -hex 32)
          OLD_HEX=$(op read 'op://prod-backend/auth-jwt-secrets/password' \
            | tr -cd '[:xdigit:]' | head -c 64)
          op item edit auth-jwt-secrets --vault=prod-backend \
            "password=$NEW_HEX,$OLD_HEX"
          gh workflow run deploy-production.yml
          # re-mint ADMIN_JWT (now signed with the new entry)
          NEW_JWT=$(AUTH_JWT_SECRETS=$NEW_HEX,$OLD_HEX \
            node scripts/ops/mint-admin-jwt.mjs --profile testnet \
              --roles admin,verifier --expires-in-days 30 --quiet)
          op item edit admin-jwt --vault=prod-smoke "password=$NEW_JWT"

        Phase B (Day 1–2, ≥24h after Phase A):
          ./scripts/ops/rotate-auth-jwt-secrets-phase-b.sh
          # script reads OP, verifies ADMIN_JWT is signed by new entry,
          # confirms with operator, trims keyring to single entry,
          # triggers deploy, verifies /health + ADMIN_JWT post-flip.

      Last rotated 2026-05-13 (Phase 2 PR 2.7d Phase A). Phase B runs
      24–48h later, then update this entry's expires_at to the new
      90d horizon.

      Migrates to asymmetric KMS-signed JWTs in Phase 4b — see
      SECRETS_INTEGRATION_PLAN.md.

# Global config
config:
  default_warn_days: 7
  fail_within_days: 1
  # Entries with expires_at: "never" are tracked but never warn;
  # entries with expires_at: "TBD" are treated as past-due and
  # warned aggressively until set.
