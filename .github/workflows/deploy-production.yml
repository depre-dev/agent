name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_indexer:
        description: Force indexer deploy for operational recovery.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      wait_for_ready:
        description: Wait for indexer historical readiness after health passes.
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"
      health_stability_sec:
        description: Seconds to re-check indexer health after first passing /health.
        required: false
        default: "0"
        type: string
      indexer_log_tail:
        description: Indexer and Caddy log lines to print on deploy failure.
        required: false
        default: "120"
        type: string
      smoke_check_indexer:
        description: Include indexer in hosted smoke checks.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      indexer_database_schema:
        description: Optional explicit Ponder DATABASE_SCHEMA. Mutually exclusive with indexer_fresh_schema.
        required: false
        type: string
      indexer_fresh_schema:
        description: Auto-mint a timestamped DATABASE_SCHEMA for one-shot recovery (convenience over indexer_database_schema).
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      bootstrap_self_report_send_now:
        description: "Optional branded-email proof: send one bootstrap self-report through the admin API before hosted smoke checks."
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_instrumentation:
        description: Require upstream-status poller + optional self-report status in hosted smoke.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_self_report_sent:
        description: "Optional branded-email proof: require the bootstrap self-report last run to be sent."
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_product_proof_gate:
        description: Require public discovery/schema/trust surfaces to match the live API.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      product_proof_require_worker_loop:
        description: Run one real hosted worker loop, write evidence, and require it in the product-proof gate.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      product_proof_reward_asset:
        description: Reward asset symbol for the hosted product-proof worker loop. Leave blank for the canonical v1 USDC settlement path; non-USDC values fail closed before mutation.
        required: false
        default: ""
        type: string
      run_hermes_post_deploy:
        description: Run the read-only Hermes post-deploy testbed suite after a successful deploy.
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

concurrency:
  group: production
  cancel-in-progress: false

# Default to least privilege. Steps that need more (e.g. id-token: write
# for OIDC in Phase 3) must elevate explicitly.
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy VPS production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      # Phase 2 PR 2.7a removed three legacy GH-secret job-env bindings:
      #   VPS_SSH_KEY                  → now $VPS_SSH_KEY_OP from op://prod-ci/vps-ssh-key/private key
      #   APP_BASIC_AUTH_USER          → now $APP_BASIC_AUTH_USER_OP from op://prod-ci/app-basic-auth-hash/username
      #   APP_BASIC_AUTH_PASSWORD_HASH → now $APP_BASIC_AUTH_PASSWORD_HASH_OP from op://prod-ci/app-basic-auth-hash/credential
      # All three were parity-checked successfully across many deploys in
      # PRs 2.1 and 2.2 before the flip. APP_BASIC_AUTH_PASSWORD (raw)
      # has been absent since PR 2.2 — the bcrypt HASH is sufficient for
      # Caddy auth; the raw plaintext lives only in op://prod-critical
      # for human operators typing into the browser dialog.
      #
      # Operator action after this PR merges + one green deploy:
      #   gh secret delete VPS_SSH_KEY APP_BASIC_AUTH_USER APP_BASIC_AUTH_PASSWORD_HASH -R averray-agent/agent
      APP_ALLOW_PROTECTED_SHELL: ${{ secrets.APP_ALLOW_PROTECTED_SHELL }}
      # ADMIN_JWT (legacy GH secret) removed in PR 2.8b — the deploy
      # now reads $ADMIN_JWT_OP from 1Password
      # (op://prod-smoke/admin-jwt/password) via the fail-closed
      # smoke-vault load step below. PR 2.8a's parity check confirmed
      # the OP value matched the legacy byte-for-byte before the flip.
      # Operator action after this PR merges + one green deploy:
      #   gh secret delete ADMIN_JWT -R averray-agent/agent
      # RESEND_API_KEY, BOOTSTRAP_SELF_REPORT_TO, BOOTSTRAP_SELF_REPORT_FROM
      # removed in PR 2.7b. Resend is an optional branded-email transport;
      # Hermes/operator reporting is the launch proof channel. After PR 2.6 retired
      # configure_bootstrap_instrumentation_env, the SSH-passed copies
      # of these became dead code — the backend container now reads
      # them directly from /run/agent-stack/backend.env, which is
      # rendered from deploy/backend.env.template:
      #   RESEND_API_KEY=op://prod-backend-external/resend-api-key/password
      #   BOOTSTRAP_SELF_REPORT_* literal config values.
      # Operator action after this PR merges + one green deploy:
      #   gh secret delete RESEND_API_KEY BOOTSTRAP_SELF_REPORT_TO BOOTSTRAP_SELF_REPORT_FROM -R averray-agent/agent
      DEPLOY_RUN_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_indexer || 'auto' }}
      DEPLOY_WAIT_FOR_READY: ${{ github.event_name == 'workflow_dispatch' && inputs.wait_for_ready || '1' }}
      DEPLOY_HEALTH_STABILITY_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.health_stability_sec || '0' }}
      DEPLOY_INDEXER_LOG_TAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_log_tail || '120' }}
      DEPLOY_SMOKE_CHECK_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_indexer || 'auto' }}
      DEPLOY_INDEXER_DATABASE_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_database_schema || '' }}
      DEPLOY_INDEXER_FRESH_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_fresh_schema || '0' }}
      DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_NOW: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_self_report_send_now || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_instrumentation || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_self_report_sent || '0' }}
      DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_product_proof_gate || '0' }}
      DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP: ${{ github.event_name == 'workflow_dispatch' && inputs.product_proof_require_worker_loop || '0' }}
      DEPLOY_PRODUCT_PROOF_REWARD_ASSET: ${{ github.event_name == 'workflow_dispatch' && inputs.product_proof_reward_asset || '' }}
      DEPLOY_RUN_HERMES_POST_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hermes_post_deploy || '1' }}
      HERMES_POST_DEPLOY_TIMEOUT: 12m
    steps:
      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          # Phase 2 PR 2.7a: VPS_SSH_KEY + APP_BASIC_AUTH_* checks moved
          # below the prod-ci load step (they're $VPS_SSH_KEY_OP /
          # $APP_BASIC_AUTH_USER_OP / $APP_BASIC_AUTH_PASSWORD_HASH_OP
          # now, populated by `load-secrets-action`). That step is
          # fail-closed; an empty/missing OP value aborts the deploy
          # before any container restart.
          # Phase 2 PR 2.8b: ADMIN_JWT validation lives below the
          # smoke-vault load step for the same reason.

      # ─── Phase 2 PR 2.7a: prod-ci secrets from 1Password (FAIL-CLOSED, active source) ──
      #
      # PRs 2.1 and 2.2 wired this up as a non-blocking parity check;
      # PR 2.7a flips the active source: $VPS_SSH_KEY_OP /
      # $APP_BASIC_AUTH_USER_OP / $APP_BASIC_AUTH_PASSWORD_HASH_OP are
      # now what the Configure SSH step and the Deploy heredoc consume.
      # The three legacy GH-secret env bindings have been removed from
      # the job-level env block above.
      #
      # Per-secret verification history:
      #   • VPS_SSH_KEY: byte-for-byte cmp -s against legacy was green
      #     for the entire PR 2.1 → 2.4 window. SSH key was rotated
      #     during PR 2.1 acceptance (lost-legacy-key incident) and
      #     re-aligned in OP + GH; subsequent deploys verified parity.
      #   • APP_BASIC_AUTH_USER: byte-for-byte against legacy. Green.
      #   • APP_BASIC_AUTH_PASSWORD_HASH: bcrypt salts make byte-
      #     compare impossible (same plaintext + different salt =
      #     different hash). The hash was verified semantically by
      #     hashing the OP plaintext during PR 2.2 setup, and the
      #     end-to-end 401/200 smoke check (still runs at end of
      #     deploy) is the load-bearing verification that the hash
      #     authenticates the correct password.
      #
      # A 1Password outage / wrong token / missing item / wrong vault
      # scope now fails the deploy at this step, before any container
      # restart — fail-closed.
      #
      # If you see this step fail post-PR-2.7a:
      #   1. Confirm OP_SERVICE_ACCOUNT_TOKEN_PROD_CI is set in the
      #      production GitHub environment.
      #   2. Confirm the three op:// paths resolve:
      #      op item get vps-ssh-key --vault=prod-ci
      #      op item get app-basic-auth-hash --vault=prod-ci
      #   3. Confirm the service-account token's vault scope still
      #      includes prod-ci (1Password Web → Integrations).
      - name: Load prod-ci secrets from 1Password (fail-closed)
        id: load_op_ci
        # Pinned to 1password/load-secrets-action v4.0.0 commit SHA
        # (verified via the v4.0.0 annotated tag's commit object).
        # v4.0.0 is the first release that runs on Node 24, required by
        # GitHub Actions runners after 2026-06-02 (auto-flip date) and
        # mandatory after 2026-09-16:
        #   https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
        # Refresh by re-running (annotated tag → commit):
        #   tag_sha=$(gh api repos/1Password/load-secrets-action/git/refs/tags/<tag> --jq .object.sha)
        #   gh api repos/1Password/load-secrets-action/git/tags/$tag_sha --jq .object.sha
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PROD_CI }}
          VPS_SSH_KEY_OP: op://prod-ci/vps-ssh-key/private key
          APP_BASIC_AUTH_USER_OP: op://prod-ci/app-basic-auth-hash/username
          APP_BASIC_AUTH_PASSWORD_HASH_OP: op://prod-ci/app-basic-auth-hash/credential

      # Shape + non-empty check on the three loaded values. Without
      # legacy secrets to byte-compare against (they've been removed
      # from the job env in PR 2.7a), this is structural validation
      # only: fail fast here rather than at SSH-write or at the
      # 401/200 smoke check downstream.
      - name: Verify prod-ci OP values loaded and shape-valid
        run: |
          set -euo pipefail
          set +x

          fail=false

          # VPS_SSH_KEY_OP: OpenSSH private-key shape sanity.
          # We don't print the value; we just confirm the leading
          # "-----BEGIN OPENSSH PRIVATE KEY-----" marker is there.
          if [ -z "${VPS_SSH_KEY_OP:-}" ]; then
            echo "::error::VPS_SSH_KEY_OP is empty after load step — check op://prod-ci/vps-ssh-key/private key"
            fail=true
          else
            case "$VPS_SSH_KEY_OP" in
              -----BEGIN*PRIVATE\ KEY-----*)
                echo "VPS_SSH_KEY_OP: SSH private-key shape valid"
                ;;
              *)
                echo "::error::VPS_SSH_KEY_OP does not look like an OpenSSH/PEM private key"
                fail=true
                ;;
            esac
          fi

          # APP_BASIC_AUTH_USER_OP: non-empty string. Usernames have
          # no fixed shape; non-empty is the only meaningful check.
          if [ -z "${APP_BASIC_AUTH_USER_OP:-}" ]; then
            echo "::error::APP_BASIC_AUTH_USER_OP is empty — check op://prod-ci/app-basic-auth-hash/username"
            fail=true
          else
            echo "APP_BASIC_AUTH_USER_OP: non-empty"
          fi

          # APP_BASIC_AUTH_PASSWORD_HASH_OP: bcrypt shape check ($2a$/$2b$/$2y$).
          # Semantic correctness (the hash authenticates the right
          # password) is verified end-to-end by the 401/200 smoke
          # check on app.averray.com later in this deploy.
          if [ -z "${APP_BASIC_AUTH_PASSWORD_HASH_OP:-}" ]; then
            echo "::error::APP_BASIC_AUTH_PASSWORD_HASH_OP is empty — check op://prod-ci/app-basic-auth-hash/credential"
            fail=true
          else
            case "$APP_BASIC_AUTH_PASSWORD_HASH_OP" in
              \$2a\$*|\$2b\$*|\$2y\$*)
                echo "APP_BASIC_AUTH_PASSWORD_HASH_OP: bcrypt shape valid"
                ;;
              *)
                echo "::error::APP_BASIC_AUTH_PASSWORD_HASH_OP does not look like a bcrypt hash"
                fail=true
                ;;
            esac
          fi

          if [ "$fail" = "true" ]; then
            exit 1
          fi

      # ─── Phase 2 PR 2.8b: ADMIN_JWT from 1Password (FAIL-CLOSED, active source) ──
      #
      # PR 2.8a wired this up as a non-blocking parity check; PR 2.8b
      # flips the active source: $ADMIN_JWT_OP is now what the deploy
      # heredoc passes to the VPS smoke check, and the legacy
      # ${{ secrets.ADMIN_JWT }} env binding has been removed from the
      # job-level env block above. A 1Password outage / wrong token /
      # missing item now fails the deploy at this step, before any
      # container restart — which is the correct fail-closed behavior
      # for a load-bearing secret read.
      #
      # If you see this step fail post-PR-2.8b:
      #   1. Confirm OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE is set in the
      #      production GitHub environment (`gh secret list --env production`).
      #   2. Confirm op://prod-smoke/admin-jwt/password resolves
      #      (`op item get admin-jwt --vault=prod-smoke`).
      #   3. Confirm the service-account token's vault scope still
      #      includes prod-smoke (1Password Web → Integrations).
      - name: Load ADMIN_JWT from 1Password (fail-closed)
        id: load_op_smoke
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE }}
          ADMIN_JWT_OP: op://prod-smoke/admin-jwt/password

      # Shape + non-empty check on the loaded value. Without a legacy
      # secret to byte-compare against (it's been removed from the job
      # env in PR 2.8b), this is now structural validation only:
      # if op inject silently returned empty or returned something
      # that isn't a JWT, fail the deploy here rather than at the
      # smoke check on the VPS.
      - name: Verify ADMIN_JWT_OP loaded and shape-valid
        run: |
          set -euo pipefail
          set +x

          if [ -z "${ADMIN_JWT_OP:-}" ]; then
            echo "::error::ADMIN_JWT_OP is empty after load step — check op://prod-smoke/admin-jwt/password and the prod-smoke service-account scope."
            exit 1
          fi

          case "$ADMIN_JWT_OP" in
            ey*.*.*)
              echo "ADMIN_JWT_OP: JWT shape valid"
              ;;
            *)
              echo "::error::ADMIN_JWT_OP does not look like a JWT (expected ey<...>.<...>.<...>)"
              exit 1
              ;;
          esac

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Phase 2 PR 2.7a: $VPS_SSH_KEY_OP was loaded from
          # op://prod-ci/vps-ssh-key/private key by the fail-closed
          # prod-ci load step above; the legacy VPS_SSH_KEY GH-secret
          # env binding is gone. (Never reference a `${X secrets.Y X}`
          # expression — using `X` placeholders here to avoid the same
          # pitfall in this comment — inside a run-block comment: GA
          # evaluates it BEFORE bash, and a multi-line secret value
          # injected into a `#` comment splits across newlines, and
          # the post-newline lines execute as shell commands. That's
          # how PR 2.7a's first deploy crashed Configure SSH with
          # `***: command not found`.)
          printf '%s\n' "$VPS_SSH_KEY_OP" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          # APP_BASIC_AUTH_PASSWORD (raw) is intentionally NOT in this
          # heredoc anymore — render-caddyfile.sh on the VPS now requires
          # the HASH and rejects the raw value (PR 2.2). The plaintext
          # lives only in op://prod-critical/app-basic-auth for human
          # operators typing into the browser dialog.
          #
          # Phase 2 PR 2.7a: APP_BASIC_AUTH_USER and APP_BASIC_AUTH_PASSWORD_HASH
          # below now read $APP_BASIC_AUTH_USER_OP and
          # $APP_BASIC_AUTH_PASSWORD_HASH_OP, loaded from
          # op://prod-ci/app-basic-auth-hash by the fail-closed prod-ci
          # load step. The legacy GH-secret env bindings have been
          # removed; the secrets can be deleted with
          #   gh secret delete APP_BASIC_AUTH_USER APP_BASIC_AUTH_PASSWORD_HASH -R averray-agent/agent
          # after one green deploy.
          #
          # Phase 2 PR 2.8b: ADMIN_JWT below reads $ADMIN_JWT_OP
          # (loaded from op://prod-smoke/admin-jwt/password by the
          # fail-closed smoke-load step above), not the legacy
          # ADMIN_JWT GH secret. (Same caveat as the Configure SSH
          # block above: never `${X secrets.NAME X}` inside a
          # run-block comment.)
          #
          # Phase 2 PR 2.7b: RESEND_API_KEY, BOOTSTRAP_SELF_REPORT_TO,
          # BOOTSTRAP_SELF_REPORT_FROM, and BOOTSTRAP_SELF_REPORT_SEND_ON_START
          # were removed from this heredoc. Audit confirmed nothing on
          # the VPS reads them after PR 2.6 retired
          # configure_bootstrap_instrumentation_env — the backend
          # container gets these values directly from
          # /run/agent-stack/backend.env (RESEND_API_KEY is OP-sourced
          # via deploy/backend.env.template:47; the BOOTSTRAP_SELF_REPORT_*
          # values are template-hardcoded config, not secrets).
          remote_env=$(
            printf 'APP_BASIC_AUTH_USER=%q APP_BASIC_AUTH_PASSWORD_HASH=%q APP_ALLOW_PROTECTED_SHELL=%q ADMIN_JWT=%q RUN_INDEXER=%q WAIT_FOR_READY=%q HEALTH_STABILITY_SEC=%q INDEXER_LOG_TAIL=%q SMOKE_CHECK_INDEXER=%q BOOTSTRAP_SELF_REPORT_SEND_NOW=%q SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION=%q SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT=%q SMOKE_CHECK_PRODUCT_PROOF_GATE=%q PRODUCT_PROOF_REQUIRE_WORKER_LOOP=%q PRODUCT_PROOF_REWARD_ASSET=%q INDEXER_DATABASE_SCHEMA=%q INDEXER_FRESH_SCHEMA=%q ' \
              "$APP_BASIC_AUTH_USER_OP" \
              "$APP_BASIC_AUTH_PASSWORD_HASH_OP" \
              "$APP_ALLOW_PROTECTED_SHELL" \
              "$ADMIN_JWT_OP" \
              "$DEPLOY_RUN_INDEXER" \
              "$DEPLOY_WAIT_FOR_READY" \
              "$DEPLOY_HEALTH_STABILITY_SEC" \
              "$DEPLOY_INDEXER_LOG_TAIL" \
              "$DEPLOY_SMOKE_CHECK_INDEXER" \
              "$DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_NOW" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT" \
              "$DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE" \
              "$DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP" \
              "$DEPLOY_PRODUCT_PROOF_REWARD_ASSET" \
              "$DEPLOY_INDEXER_DATABASE_SCHEMA" \
              "$DEPLOY_INDEXER_FRESH_SCHEMA"
          )

          # ServerAliveInterval=30 + ServerAliveCountMax=120 keeps the session
          # alive for up to 60 minutes of remote silence. Long-running steps —
          # in particular `npm ci` for the operator frontend — produce no SSH
          # traffic for several minutes at a stretch, and a default-keepalive
          # session times out partway through the build with `client_loop: send
          # disconnect: Broken pipe` (exit 255). The build itself is not slow
          # enough to be a problem; the *idle* session is.
          ssh -p "${VPS_PORT:-22}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "$VPS_USER@$VPS_HOST" \
            "${remote_env} bash -s" <<'REMOTE'
          set -e
          cd /srv/agent-stack/app

          old_sha=$(git rev-parse HEAD)
          git fetch origin main
          git checkout main
          if ! git pull --ff-only origin main; then
            if [ -z "$(git status --porcelain)" ]; then
              echo "Pull failed without local changes to stash." >&2
              exit 1
            fi
            stamp=$(date -u +"%Y%m%dT%H%M%SZ")
            echo "Fast-forward pull failed with local changes; stashing and retrying ($stamp)."
            git stash push -u -m "auto-stash before production deploy $stamp" >/dev/null
            git pull --ff-only origin main
          fi
          new_sha=$(git rev-parse HEAD)

          DEPLOY_OLD_SHA="$old_sha" DEPLOY_NEW_SHA="$new_sha" ./scripts/ops/deploy-production.sh
          REMOTE

      - name: Ask Hermes for post-deploy testbed verification
        id: hermes_post_deploy
        if: env.DEPLOY_RUN_HERMES_POST_DEPLOY == '1'
        continue-on-error: true
        env:
          HERMES_DEPLOY_CORRELATION_ID: github-deploy-${{ github.run_id }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          HERMES_DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          HERMES_DEPLOY_EVENT: ${{ github.event_name }}
        run: |
          prompt=$(
            cat <<PROMPT
          Use Averray MCP tools only. Call averray_invoke_agent_task with requester='github-actions', intent='post_deploy_verification', repo='averray-agent/agent', sha='${HERMES_DEPLOY_SHA}', correlationId='${HERMES_DEPLOY_CORRELATION_ID}', reason='post-production-deploy verification after ${HERMES_DEPLOY_EVENT}', testCaseIds=['TBE2E-001','TBE2E-002','TBE2E-003','TBE2E-006','TBE2E-007','TBE2E-008','TBE2E-009','TBE2E-010'], healthUrls=['https://api.averray.com/health','https://api.averray.com/onboarding','https://index.averray.com/ready','https://averray.com/.well-known/agent-tools.json']. Report finalVerdict, finalReason, pass/fail/skip counts, hosted health, GitHub workflow health, ops signals, requested tests, and safety briefly. Do not run guarded live mutation, do not submit work, do not write GitHub brief checkpoints, and do not mutate GitHub.
          PROMPT
          )

          remote_env=$(printf 'HERMES_POST_DEPLOY_PROMPT=%q ' "$prompt")

          : > hermes-post-deploy.log
          set +e
          timeout "$HERMES_POST_DEPLOY_TIMEOUT" ssh -p "${VPS_PORT:-22}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "$VPS_USER@$VPS_HOST" \
            "${remote_env} bash -s" <<'REMOTE' | tee hermes-post-deploy.log
          set -euo pipefail
          cd /srv/averray-reference-agent
          docker compose --env-file .env.prod \
            -f ops/compose.yml \
            -f ops/compose.prod.yml \
            -p avg \
            exec -T hermes /opt/hermes/.venv/bin/hermes chat \
              --provider ollama-cloud \
              -m deepseek-v4-pro:cloud \
              -q "$HERMES_POST_DEPLOY_PROMPT"
          REMOTE
          status=${PIPESTATUS[0]}
          set -e
          outcome=failed

          if [ "$status" -eq 0 ]; then
            outcome=success
          elif [ "$status" -eq 124 ]; then
            outcome=timeout
            {
              echo
              echo "Hermes post-deploy verification timed out after ${HERMES_POST_DEPLOY_TIMEOUT}."
              echo "The production deploy already completed; inspect the remote Hermes session before relying on the verification result."
            } | tee -a hermes-post-deploy.log
          fi

          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"

          {
            echo "## Hermes Post-Deploy Verification"
            echo
            echo "- Correlation: \`${HERMES_DEPLOY_CORRELATION_ID}\`"
            echo "- Commit: \`${HERMES_DEPLOY_SHA}\`"
            echo "- Outcome: \`${outcome}\`"
            echo
            echo '```text'
            sed -n '1,220p' hermes-post-deploy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Upload Hermes post-deploy log
        if: always() && env.DEPLOY_RUN_HERMES_POST_DEPLOY == '1' && steps.hermes_post_deploy.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-post-deploy-${{ github.run_id }}
          path: hermes-post-deploy.log
          if-no-files-found: error
          retention-days: 90

      - name: Fail if Hermes post-deploy verification failed
        if: always() && env.DEPLOY_RUN_HERMES_POST_DEPLOY == '1' && steps.hermes_post_deploy.outcome != 'skipped' && steps.hermes_post_deploy.outputs.exit_status != '0'
        run: |
          echo "Hermes post-deploy verification failed with status ${HERMES_STATUS:-unknown}."
          exit 1
        env:
          HERMES_STATUS: ${{ steps.hermes_post_deploy.outputs.exit_status }}
