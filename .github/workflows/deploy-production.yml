name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_indexer:
        description: Force indexer deploy for operational recovery.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      wait_for_ready:
        description: Wait for indexer historical readiness after health passes.
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"
      health_stability_sec:
        description: Seconds to re-check indexer health after first passing /health.
        required: false
        default: "0"
        type: string
      indexer_log_tail:
        description: Indexer and Caddy log lines to print on deploy failure.
        required: false
        default: "120"
        type: string
      smoke_check_indexer:
        description: Include indexer in hosted smoke checks.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      indexer_database_schema:
        description: Optional explicit Ponder DATABASE_SCHEMA. Mutually exclusive with indexer_fresh_schema.
        required: false
        type: string
      indexer_fresh_schema:
        description: Auto-mint a timestamped DATABASE_SCHEMA for one-shot recovery (convenience over indexer_database_schema).
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      bootstrap_self_report_send_on_start:
        description: One-shot bootstrap self-report send on backend start.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_instrumentation:
        description: Require bootstrap poller + self-report status in hosted smoke.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_self_report_sent:
        description: Require the bootstrap self-report last run to be sent.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_product_proof_gate:
        description: Require public discovery/schema/trust surfaces to match the live API.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      product_proof_require_worker_loop:
        description: Run one real hosted worker loop, write evidence, and require it in the product-proof gate.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      product_proof_reward_asset:
        description: Reward asset symbol for the hosted product-proof worker loop. Leave blank to keep the deploy-script default (DOT). Set to "USDC" to exercise the v1 USDC settlement path against the on-chain TreasuryPolicy approved-asset list.
        required: false
        default: ""
        type: string
      run_hermes_post_deploy:
        description: Run the read-only Hermes post-deploy testbed suite after a successful deploy.
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

concurrency:
  group: production
  cancel-in-progress: false

# Default to least privilege. Steps that need more (e.g. id-token: write
# for OIDC in Phase 3) must elevate explicitly.
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy VPS production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      APP_BASIC_AUTH_USER: ${{ secrets.APP_BASIC_AUTH_USER }}
      APP_BASIC_AUTH_PASSWORD_HASH: ${{ secrets.APP_BASIC_AUTH_PASSWORD_HASH }}
      # APP_BASIC_AUTH_PASSWORD (raw) was here pre-PR-2.2. Removed: the
      # render-caddyfile.sh script no longer accepts raw passwords —
      # it would have put them in `ps` output during the call. The raw
      # password lives only in op://prod-critical/app-basic-auth, used by
      # human operators when typing into the browser basic-auth dialog.
      # Caddy verifies via the bcrypt HASH below.
      APP_ALLOW_PROTECTED_SHELL: ${{ secrets.APP_ALLOW_PROTECTED_SHELL }}
      ADMIN_JWT: ${{ secrets.ADMIN_JWT }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BOOTSTRAP_SELF_REPORT_TO: ${{ secrets.BOOTSTRAP_SELF_REPORT_TO }}
      BOOTSTRAP_SELF_REPORT_FROM: ${{ secrets.BOOTSTRAP_SELF_REPORT_FROM }}
      DEPLOY_RUN_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_indexer || 'auto' }}
      DEPLOY_WAIT_FOR_READY: ${{ github.event_name == 'workflow_dispatch' && inputs.wait_for_ready || '1' }}
      DEPLOY_HEALTH_STABILITY_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.health_stability_sec || '0' }}
      DEPLOY_INDEXER_LOG_TAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_log_tail || '120' }}
      DEPLOY_SMOKE_CHECK_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_indexer || 'auto' }}
      DEPLOY_INDEXER_DATABASE_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_database_schema || '' }}
      DEPLOY_INDEXER_FRESH_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_fresh_schema || '0' }}
      DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_ON_START: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_self_report_send_on_start || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_instrumentation || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_self_report_sent || '0' }}
      DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_product_proof_gate || '0' }}
      DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP: ${{ github.event_name == 'workflow_dispatch' && inputs.product_proof_require_worker_loop || '0' }}
      DEPLOY_PRODUCT_PROOF_REWARD_ASSET: ${{ github.event_name == 'workflow_dispatch' && inputs.product_proof_reward_asset || '' }}
      DEPLOY_RUN_HERMES_POST_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.run_hermes_post_deploy || '1' }}
      HERMES_POST_DEPLOY_TIMEOUT: 12m
    steps:
      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          if [ -n "$APP_BASIC_AUTH_USER" ]; then
            # Phase 2 PR 2.2: raw APP_BASIC_AUTH_PASSWORD no longer flows
            # through CI. Caddy auth is verified via the bcrypt HASH only.
            test -n "$APP_BASIC_AUTH_PASSWORD_HASH"
          fi
          # Phase 2 PR 2.8a: fail fast if the legacy ADMIN_JWT is empty.
          # The hosted product-proof smoke check on the VPS needs this to
          # authenticate; without it, it would silently 401 late in the
          # deploy. PR 2.8b sources this from 1Password and removes the
          # legacy GH-secret dependency once parity has been green.
          test -n "$ADMIN_JWT"

      # ─── Phase 2 PR 2.1: parity check between OP-loaded and legacy SSH key ──
      #
      # Load VPS_SSH_KEY_OP from 1Password via the prod-ci-deploy
      # service-account token. The OP token is set ONLY on this step
      # (step-level `env:`, NOT job-level) so subsequent steps in this
      # job cannot read it — per 1Password's docs, putting the token at
      # job level would expose it to every step that follows.
      #
      # continue-on-error: a 1Password outage MUST NOT break the deploy
      # during the validation window. The downstream "Configure SSH"
      # step still uses the legacy ${{ secrets.VPS_SSH_KEY }} value.
      # PR 2.4 will flip the SSH write to use $VPS_SSH_KEY_OP and delete
      # the legacy secret 24h after the OP path has been proven stable.
      - name: Load CI-side secrets from 1Password (parity check, non-blocking)
        id: load_op_ssh
        continue-on-error: true
        # Pinned to 1password/load-secrets-action v2.0.0 commit SHA
        # (verified via the v2.0.0 annotated tag's commit object).
        # Refresh by re-running:
        #   curl -s https://api.github.com/repos/1Password/load-secrets-action/git/tags/<tag-sha> | jq .object.sha
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PROD_CI }}
          VPS_SSH_KEY_OP: op://prod-ci/vps-ssh-key/private key
          # PR 2.2 additions — Caddy basic-auth bundle, parity-loaded here,
          # used by render-caddyfile.sh once PR 2.4 swaps the heredoc.
          APP_BASIC_AUTH_USER_OP: op://prod-ci/app-basic-auth-hash/username
          APP_BASIC_AUTH_PASSWORD_HASH_OP: op://prod-ci/app-basic-auth-hash/credential

      # Compare without ever printing key material. Writes both to
      # umask-077 mktemp files, runs `cmp -s`, and logs only the
      # yes/no result plus byte lengths on mismatch. The byte length
      # is intentionally NOT a fingerprint — it only helps diagnose
      # newline-handling regressions.
      - name: Compare OP-loaded VPS SSH key against legacy GH secret
        if: steps.load_op_ssh.outcome == 'success'
        env:
          LEGACY_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          set +x
          umask 077

          legacy_file=$(mktemp)
          op_file=$(mktemp)
          trap 'rm -f "$legacy_file" "$op_file"' EXIT

          printf '%s' "$LEGACY_KEY" > "$legacy_file"
          printf '%s' "$VPS_SSH_KEY_OP" > "$op_file"
          chmod 0400 "$legacy_file" "$op_file"

          if cmp -s "$legacy_file" "$op_file"; then
            echo "VPS_SSH_KEY_OP matches legacy secret: yes"
          else
            legacy_len=$(wc -c < "$legacy_file" | tr -d ' ')
            op_len=$(wc -c < "$op_file" | tr -d ' ')
            echo "VPS_SSH_KEY_OP matches legacy secret: no"
            echo "    legacy length: $legacy_len bytes"
            echo "    OP length:     $op_len bytes"
            echo "::warning::OP-loaded VPS SSH key does NOT match legacy GH Actions secret. Investigate before PR 2.4 swaps to the OP value."
          fi

      - name: Note when 1Password load step failed (deploy proceeds with legacy key)
        if: steps.load_op_ssh.outcome == 'failure'
        run: |
          echo "::warning::1Password load-secrets-action failed; falling back to legacy VPS_SSH_KEY from GH Actions. Investigate before assuming Phase 2 is healthy."

      # ─── Phase 2 PR 2.2: Caddy basic-auth parity / presence check ──
      #
      # The bcrypt hash in op://prod-ci/app-basic-auth-hash/credential is
      # SEMANTICALLY equivalent to ${{ secrets.APP_BASIC_AUTH_PASSWORD_HASH }}
      # but bcrypt salts make the two byte-strings non-identical. We
      # therefore can't `cmp -s` them — we only check:
      #   (a) the OP-loaded values are non-empty (load worked end-to-end)
      #   (b) the OP-loaded hash starts with $2a$ / $2b$ / $2y$
      #   (c) the legacy GH-secret hash also starts with $2a$ / $2b$ / $2y$
      #   (d) the OP-loaded user matches the legacy user byte-for-byte
      # Mismatches surface as workflow ::warning:: annotations so they're
      # visible in the PR check summary; the deploy still uses the legacy
      # values until PR 2.4 swaps the heredoc. The 401/200 smoke check at
      # the end of the deploy is the load-bearing verification.
      - name: Verify OP-loaded Caddy basic-auth values (parity, non-blocking)
        if: steps.load_op_ssh.outcome == 'success'
        env:
          LEGACY_USER: ${{ secrets.APP_BASIC_AUTH_USER }}
          LEGACY_HASH: ${{ secrets.APP_BASIC_AUTH_PASSWORD_HASH }}
        run: |
          set -euo pipefail
          set +x

          fail_warn=false

          # (a) non-empty checks
          if [ -z "${APP_BASIC_AUTH_USER_OP:-}" ]; then
            echo "::warning::OP-loaded APP_BASIC_AUTH_USER_OP is empty — check op://prod-ci/app-basic-auth-hash/username exists"
            fail_warn=true
          fi
          if [ -z "${APP_BASIC_AUTH_PASSWORD_HASH_OP:-}" ]; then
            echo "::warning::OP-loaded APP_BASIC_AUTH_PASSWORD_HASH_OP is empty — check op://prod-ci/app-basic-auth-hash/credential exists"
            fail_warn=true
          fi

          # (b) OP-loaded hash shape
          if [ -n "${APP_BASIC_AUTH_PASSWORD_HASH_OP:-}" ]; then
            case "$APP_BASIC_AUTH_PASSWORD_HASH_OP" in
              \$2a\$*|\$2b\$*|\$2y\$*)
                echo "APP_BASIC_AUTH_PASSWORD_HASH_OP: bcrypt shape valid"
                ;;
              *)
                echo "::warning::OP-loaded APP_BASIC_AUTH_PASSWORD_HASH_OP does not look like a bcrypt hash"
                fail_warn=true
                ;;
            esac
          fi

          # (c) legacy GH-secret hash shape (sanity check on the value
          # we're actually still deploying with).
          if [ -n "${LEGACY_HASH:-}" ]; then
            case "$LEGACY_HASH" in
              \$2a\$*|\$2b\$*|\$2y\$*)
                echo "legacy APP_BASIC_AUTH_PASSWORD_HASH: bcrypt shape valid"
                ;;
              *)
                echo "::warning::legacy APP_BASIC_AUTH_PASSWORD_HASH (GH secret) does not look like a bcrypt hash — deploy will likely fail at render-caddyfile.sh"
                fail_warn=true
                ;;
            esac
          fi

          # (d) byte-for-byte compare of usernames (not secrets, but
          # mismatch means OP and GH drifted; same printf '%s' / cmp -s
          # pattern as the SSH key check).
          if [ -n "${APP_BASIC_AUTH_USER_OP:-}" ] && [ -n "${LEGACY_USER:-}" ]; then
            umask 077
            legacy_file=$(mktemp)
            op_file=$(mktemp)
            trap 'rm -f "$legacy_file" "$op_file"' EXIT
            printf '%s' "$LEGACY_USER" > "$legacy_file"
            printf '%s' "$APP_BASIC_AUTH_USER_OP" > "$op_file"
            if cmp -s "$legacy_file" "$op_file"; then
              echo "APP_BASIC_AUTH_USER_OP matches legacy secret: yes"
            else
              echo "APP_BASIC_AUTH_USER_OP matches legacy secret: no"
              echo "::warning::OP-loaded basic-auth username drifted from legacy GH secret. Investigate before PR 2.4 swaps."
              fail_warn=true
            fi
          fi

          if [ "$fail_warn" = "true" ]; then
            echo "::warning::Caddy basic-auth parity check raised warnings (deploy proceeds with legacy values)"
          fi

      # ─── Phase 2 PR 2.8a: ADMIN_JWT from 1Password (parity check, non-blocking) ──
      #
      # Mirrors the PR 2.1 / PR 2.2 staging pattern: load the OP value
      # in a separate step that uses the prod-smoke service-account
      # token, compare byte-for-byte against the legacy
      # ${{ secrets.ADMIN_JWT }} GH secret, surface drift as a workflow
      # warning, but DON'T switch the active source yet. PR 2.8b flips
      # to $ADMIN_JWT_OP once we've seen a few green parity checks.
      #
      # Why a separate load step (not just adding ADMIN_JWT_OP to the
      # existing prod-ci load step): 1Password service-account tokens
      # are vault-scoped at creation and immutable. The prod-ci token
      # cannot read from prod-smoke; we need a second token specifically
      # for the smoke vault. Operator action required BEFORE this
      # path produces a value:
      #
      #   1. In 1Password, create a service account with read access
      #      to the prod-smoke vault (only that vault).
      #   2. Save the token (859 chars, `ops_…` prefix) to the
      #      production GH environment as
      #      OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE.
      #
      # Until that's done, the load step below fails (continue-on-error)
      # and the deploy proceeds with the legacy GH secret. Look for
      # "Note when 1Password smoke load step failed" in the workflow
      # output to confirm whether the token is wired.
      - name: Load smoke-vault secret from 1Password (parity check, non-blocking)
        id: load_op_smoke
        continue-on-error: true
        # Pinned to the same load-secrets-action SHA as the prod-ci step
        # above; refresh the two in lockstep.
        uses: 1password/load-secrets-action@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE }}
          ADMIN_JWT_OP: op://prod-smoke/admin-jwt/credential

      # Same compare-via-tempfiles pattern as the SSH key check above:
      # value never printed; mtime-077 mktemp; cmp -s; warn on
      # mismatch. JWTs have a 3-part dot-separated shape we sanity
      # check separately so a malformed value surfaces a clear error.
      - name: Compare OP-loaded ADMIN_JWT against legacy GH secret
        if: steps.load_op_smoke.outcome == 'success'
        env:
          LEGACY_JWT: ${{ secrets.ADMIN_JWT }}
        run: |
          set -euo pipefail
          set +x
          umask 077

          fail_warn=false

          if [ -z "${ADMIN_JWT_OP:-}" ]; then
            echo "::warning::OP-loaded ADMIN_JWT_OP is empty — check op://prod-smoke/admin-jwt/credential exists"
            fail_warn=true
          fi
          if [ -z "${LEGACY_JWT:-}" ]; then
            echo "::warning::legacy ADMIN_JWT GH secret is empty — smoke check that uses it will fail downstream"
            fail_warn=true
          fi

          # JWT shape sanity: <base64url>.<base64url>.<base64url>
          if [ -n "${ADMIN_JWT_OP:-}" ]; then
            case "$ADMIN_JWT_OP" in
              ey*.*.*)
                echo "ADMIN_JWT_OP: JWT shape valid"
                ;;
              *)
                echo "::warning::OP-loaded ADMIN_JWT_OP does not look like a JWT (expected ey<...>.<...>.<...>)"
                fail_warn=true
                ;;
            esac
          fi

          if [ -n "${ADMIN_JWT_OP:-}" ] && [ -n "${LEGACY_JWT:-}" ]; then
            legacy_file=$(mktemp)
            op_file=$(mktemp)
            trap 'rm -f "$legacy_file" "$op_file"' EXIT
            printf '%s' "$LEGACY_JWT" > "$legacy_file"
            printf '%s' "$ADMIN_JWT_OP" > "$op_file"
            chmod 0400 "$legacy_file" "$op_file"

            if cmp -s "$legacy_file" "$op_file"; then
              echo "ADMIN_JWT_OP matches legacy secret: yes"
            else
              legacy_len=$(wc -c < "$legacy_file" | tr -d ' ')
              op_len=$(wc -c < "$op_file" | tr -d ' ')
              echo "ADMIN_JWT_OP matches legacy secret: no"
              echo "    legacy length: $legacy_len bytes"
              echo "    OP length:     $op_len bytes"
              echo "::warning::OP-loaded ADMIN_JWT does NOT match legacy GH Actions secret. Investigate before PR 2.8b swaps to the OP value."
              fail_warn=true
            fi
          fi

          if [ "$fail_warn" = "true" ]; then
            echo "::warning::ADMIN_JWT parity check raised warnings (deploy proceeds with legacy value)"
          fi

      - name: Note when 1Password smoke load step failed (deploy proceeds with legacy ADMIN_JWT)
        if: steps.load_op_smoke.outcome == 'failure'
        run: |
          echo "::warning::1Password smoke-vault load failed; falling back to legacy ADMIN_JWT from GH Actions. If you haven't yet, add OP_SERVICE_ACCOUNT_TOKEN_PROD_SMOKE to the production environment to activate the OP path."

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          # APP_BASIC_AUTH_PASSWORD (raw) is intentionally NOT in this
          # heredoc anymore — render-caddyfile.sh on the VPS now requires
          # the HASH and rejects the raw value. PR 2.4 will further
          # eliminate the SSH-heredoc transport for APP_BASIC_AUTH_USER
          # + APP_BASIC_AUTH_PASSWORD_HASH once op inject runs on the VPS.
          remote_env=$(
            printf 'APP_BASIC_AUTH_USER=%q APP_BASIC_AUTH_PASSWORD_HASH=%q APP_ALLOW_PROTECTED_SHELL=%q ADMIN_JWT=%q RESEND_API_KEY=%q BOOTSTRAP_SELF_REPORT_TO=%q BOOTSTRAP_SELF_REPORT_FROM=%q BOOTSTRAP_SELF_REPORT_SEND_ON_START=%q RUN_INDEXER=%q WAIT_FOR_READY=%q HEALTH_STABILITY_SEC=%q INDEXER_LOG_TAIL=%q SMOKE_CHECK_INDEXER=%q SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION=%q SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT=%q SMOKE_CHECK_PRODUCT_PROOF_GATE=%q PRODUCT_PROOF_REQUIRE_WORKER_LOOP=%q PRODUCT_PROOF_REWARD_ASSET=%q INDEXER_DATABASE_SCHEMA=%q INDEXER_FRESH_SCHEMA=%q ' \
              "$APP_BASIC_AUTH_USER" \
              "$APP_BASIC_AUTH_PASSWORD_HASH" \
              "$APP_ALLOW_PROTECTED_SHELL" \
              "$ADMIN_JWT" \
              "$RESEND_API_KEY" \
              "$BOOTSTRAP_SELF_REPORT_TO" \
              "$BOOTSTRAP_SELF_REPORT_FROM" \
              "$DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_ON_START" \
              "$DEPLOY_RUN_INDEXER" \
              "$DEPLOY_WAIT_FOR_READY" \
              "$DEPLOY_HEALTH_STABILITY_SEC" \
              "$DEPLOY_INDEXER_LOG_TAIL" \
              "$DEPLOY_SMOKE_CHECK_INDEXER" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT" \
              "$DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE" \
              "$DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP" \
              "$DEPLOY_PRODUCT_PROOF_REWARD_ASSET" \
              "$DEPLOY_INDEXER_DATABASE_SCHEMA" \
              "$DEPLOY_INDEXER_FRESH_SCHEMA"
          )

          # ServerAliveInterval=30 + ServerAliveCountMax=120 keeps the session
          # alive for up to 60 minutes of remote silence. Long-running steps —
          # in particular `npm ci` for the operator frontend — produce no SSH
          # traffic for several minutes at a stretch, and a default-keepalive
          # session times out partway through the build with `client_loop: send
          # disconnect: Broken pipe` (exit 255). The build itself is not slow
          # enough to be a problem; the *idle* session is.
          ssh -p "${VPS_PORT:-22}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "$VPS_USER@$VPS_HOST" \
            "${remote_env} bash -s" <<'REMOTE'
          set -e
          cd /srv/agent-stack/app

          old_sha=$(git rev-parse HEAD)
          git fetch origin main
          git checkout main
          if ! git pull --ff-only origin main; then
            if [ -z "$(git status --porcelain)" ]; then
              echo "Pull failed without local changes to stash." >&2
              exit 1
            fi
            stamp=$(date -u +"%Y%m%dT%H%M%SZ")
            echo "Fast-forward pull failed with local changes; stashing and retrying ($stamp)."
            git stash push -u -m "auto-stash before production deploy $stamp" >/dev/null
            git pull --ff-only origin main
          fi
          new_sha=$(git rev-parse HEAD)

          DEPLOY_OLD_SHA="$old_sha" DEPLOY_NEW_SHA="$new_sha" ./scripts/ops/deploy-production.sh
          REMOTE

      - name: Ask Hermes for post-deploy testbed verification
        id: hermes_post_deploy
        if: env.DEPLOY_RUN_HERMES_POST_DEPLOY == '1'
        continue-on-error: true
        env:
          HERMES_DEPLOY_CORRELATION_ID: github-deploy-${{ github.run_id }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          HERMES_DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          HERMES_DEPLOY_EVENT: ${{ github.event_name }}
        run: |
          prompt=$(
            cat <<PROMPT
          Use Averray MCP tools only. Run the read-only post-deploy testbed verification suite for repo='averray-agent/agent', sha='${HERMES_DEPLOY_SHA}', correlationId='${HERMES_DEPLOY_CORRELATION_ID}', requester='github-actions', reason='post-production-deploy verification after ${HERMES_DEPLOY_EVENT}'. Prefer averray_invoke_agent_task with intent='testbed_suite', testSuiteId='post_deploy', testCaseIds=['TBE2E-001','TBE2E-002','TBE2E-003','TBE2E-006','TBE2E-007','TBE2E-008','TBE2E-009','TBE2E-010']. If that structured suite intent is unavailable, call averray_handle_operator_command with text='testbed e2e suite' and source='github-actions'. Report finalVerdict, pass/fail/skip counts, requested tests, deployment health, and safety briefly. Do not run guarded live mutation, do not submit work, and do not mutate GitHub.
          PROMPT
          )

          remote_env=$(printf 'HERMES_POST_DEPLOY_PROMPT=%q ' "$prompt")

          : > hermes-post-deploy.log
          set +e
          timeout "$HERMES_POST_DEPLOY_TIMEOUT" ssh -p "${VPS_PORT:-22}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "$VPS_USER@$VPS_HOST" \
            "${remote_env} bash -s" <<'REMOTE' | tee hermes-post-deploy.log
          set -euo pipefail
          cd /srv/averray-reference-agent
          docker compose --env-file .env.prod \
            -f ops/compose.yml \
            -f ops/compose.prod.yml \
            -p avg \
            exec -T hermes /opt/hermes/.venv/bin/hermes chat \
              --provider ollama-cloud \
              -m deepseek-v4-pro:cloud \
              -q "$HERMES_POST_DEPLOY_PROMPT"
          REMOTE
          status=${PIPESTATUS[0]}
          set -e
          outcome=failed

          if [ "$status" -eq 0 ]; then
            outcome=success
          elif [ "$status" -eq 124 ]; then
            outcome=timeout
            {
              echo
              echo "Hermes post-deploy verification timed out after ${HERMES_POST_DEPLOY_TIMEOUT}."
              echo "The production deploy already completed; inspect the remote Hermes session before relying on the verification result."
            } | tee -a hermes-post-deploy.log
          fi

          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"

          {
            echo "## Hermes Post-Deploy Verification"
            echo
            echo "- Correlation: \`${HERMES_DEPLOY_CORRELATION_ID}\`"
            echo "- Commit: \`${HERMES_DEPLOY_SHA}\`"
            echo "- Outcome: \`${outcome}\`"
            echo
            echo '```text'
            sed -n '1,220p' hermes-post-deploy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Fail if Hermes post-deploy verification failed
        if: always() && env.DEPLOY_RUN_HERMES_POST_DEPLOY == '1' && steps.hermes_post_deploy.outcome != 'skipped' && steps.hermes_post_deploy.outputs.exit_status != '0'
        run: |
          echo "Hermes post-deploy verification failed with status ${HERMES_STATUS:-unknown}."
          exit 1
        env:
          HERMES_STATUS: ${{ steps.hermes_post_deploy.outputs.exit_status }}
