name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_indexer:
        description: Force indexer deploy for operational recovery.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      wait_for_ready:
        description: Wait for indexer historical readiness after health passes.
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"
      health_stability_sec:
        description: Seconds to re-check indexer health after first passing /health.
        required: false
        default: "0"
        type: string
      indexer_log_tail:
        description: Indexer and Caddy log lines to print on deploy failure.
        required: false
        default: "120"
        type: string
      smoke_check_indexer:
        description: Include indexer in hosted smoke checks.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - "1"
          - "0"
      indexer_database_schema:
        description: Optional explicit Ponder DATABASE_SCHEMA. Mutually exclusive with indexer_fresh_schema.
        required: false
        type: string
      indexer_fresh_schema:
        description: Auto-mint a timestamped DATABASE_SCHEMA for one-shot recovery (convenience over indexer_database_schema).
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      bootstrap_self_report_send_on_start:
        description: One-shot bootstrap self-report send on backend start.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_instrumentation:
        description: Require bootstrap poller + self-report status in hosted smoke.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_bootstrap_self_report_sent:
        description: Require the bootstrap self-report last run to be sent.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      smoke_check_product_proof_gate:
        description: Require public discovery/schema/trust surfaces to match the live API.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      product_proof_require_worker_loop:
        description: Run one real hosted worker loop, write evidence, and require it in the product-proof gate.
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy VPS production
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      APP_BASIC_AUTH_USER: ${{ secrets.APP_BASIC_AUTH_USER }}
      APP_BASIC_AUTH_PASSWORD: ${{ secrets.APP_BASIC_AUTH_PASSWORD }}
      APP_BASIC_AUTH_PASSWORD_HASH: ${{ secrets.APP_BASIC_AUTH_PASSWORD_HASH }}
      APP_ALLOW_PROTECTED_SHELL: ${{ secrets.APP_ALLOW_PROTECTED_SHELL }}
      ADMIN_JWT: ${{ secrets.ADMIN_JWT }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BOOTSTRAP_SELF_REPORT_TO: ${{ secrets.BOOTSTRAP_SELF_REPORT_TO }}
      BOOTSTRAP_SELF_REPORT_FROM: ${{ secrets.BOOTSTRAP_SELF_REPORT_FROM }}
      DEPLOY_RUN_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_indexer || 'auto' }}
      DEPLOY_WAIT_FOR_READY: ${{ github.event_name == 'workflow_dispatch' && inputs.wait_for_ready || '1' }}
      DEPLOY_HEALTH_STABILITY_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.health_stability_sec || '0' }}
      DEPLOY_INDEXER_LOG_TAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_log_tail || '120' }}
      DEPLOY_SMOKE_CHECK_INDEXER: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_indexer || 'auto' }}
      DEPLOY_INDEXER_DATABASE_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_database_schema || '' }}
      DEPLOY_INDEXER_FRESH_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && inputs.indexer_fresh_schema || '0' }}
      DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_ON_START: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_self_report_send_on_start || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_instrumentation || '0' }}
      DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_bootstrap_self_report_sent || '0' }}
      DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_check_product_proof_gate || '0' }}
      DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP: ${{ github.event_name == 'workflow_dispatch' && inputs.product_proof_require_worker_loop || '0' }}
    steps:
      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          if [ -n "$APP_BASIC_AUTH_USER" ]; then
            test -n "$APP_BASIC_AUTH_PASSWORD"
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          remote_env=$(
            printf 'APP_BASIC_AUTH_USER=%q APP_BASIC_AUTH_PASSWORD=%q APP_BASIC_AUTH_PASSWORD_HASH=%q APP_ALLOW_PROTECTED_SHELL=%q ADMIN_JWT=%q RESEND_API_KEY=%q BOOTSTRAP_SELF_REPORT_TO=%q BOOTSTRAP_SELF_REPORT_FROM=%q BOOTSTRAP_SELF_REPORT_SEND_ON_START=%q RUN_INDEXER=%q WAIT_FOR_READY=%q HEALTH_STABILITY_SEC=%q INDEXER_LOG_TAIL=%q SMOKE_CHECK_INDEXER=%q SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION=%q SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT=%q SMOKE_CHECK_PRODUCT_PROOF_GATE=%q PRODUCT_PROOF_REQUIRE_WORKER_LOOP=%q INDEXER_DATABASE_SCHEMA=%q INDEXER_FRESH_SCHEMA=%q ' \
              "$APP_BASIC_AUTH_USER" \
              "$APP_BASIC_AUTH_PASSWORD" \
              "$APP_BASIC_AUTH_PASSWORD_HASH" \
              "$APP_ALLOW_PROTECTED_SHELL" \
              "$ADMIN_JWT" \
              "$RESEND_API_KEY" \
              "$BOOTSTRAP_SELF_REPORT_TO" \
              "$BOOTSTRAP_SELF_REPORT_FROM" \
              "$DEPLOY_BOOTSTRAP_SELF_REPORT_SEND_ON_START" \
              "$DEPLOY_RUN_INDEXER" \
              "$DEPLOY_WAIT_FOR_READY" \
              "$DEPLOY_HEALTH_STABILITY_SEC" \
              "$DEPLOY_INDEXER_LOG_TAIL" \
              "$DEPLOY_SMOKE_CHECK_INDEXER" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_INSTRUMENTATION" \
              "$DEPLOY_SMOKE_CHECK_BOOTSTRAP_SELF_REPORT_SENT" \
              "$DEPLOY_SMOKE_CHECK_PRODUCT_PROOF_GATE" \
              "$DEPLOY_PRODUCT_PROOF_REQUIRE_WORKER_LOOP" \
              "$DEPLOY_INDEXER_DATABASE_SCHEMA" \
              "$DEPLOY_INDEXER_FRESH_SCHEMA"
          )

          # ServerAliveInterval=30 + ServerAliveCountMax=120 keeps the session
          # alive for up to 60 minutes of remote silence. Long-running steps —
          # in particular `npm ci` for the operator frontend — produce no SSH
          # traffic for several minutes at a stretch, and a default-keepalive
          # session times out partway through the build with `client_loop: send
          # disconnect: Broken pipe` (exit 255). The build itself is not slow
          # enough to be a problem; the *idle* session is.
          ssh -p "${VPS_PORT:-22}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            "$VPS_USER@$VPS_HOST" \
            "${remote_env} bash -s" <<'REMOTE'
          set -e
          cd /srv/agent-stack/app

          old_sha=$(git rev-parse HEAD)
          git fetch origin main
          git checkout main
          if ! git pull --ff-only origin main; then
            if [ -z "$(git status --porcelain)" ]; then
              echo "Pull failed without local changes to stash." >&2
              exit 1
            fi
            stamp=$(date -u +"%Y%m%dT%H%M%SZ")
            echo "Fast-forward pull failed with local changes; stashing and retrying ($stamp)."
            git stash push -u -m "auto-stash before production deploy $stamp" >/dev/null
            git pull --ff-only origin main
          fi
          new_sha=$(git rev-parse HEAD)

          DEPLOY_OLD_SHA="$old_sha" DEPLOY_NEW_SHA="$new_sha" ./scripts/ops/deploy-production.sh
          REMOTE
