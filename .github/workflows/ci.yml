name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

# Cancel in-progress runs for the same ref when a new push lands — avoids
# wasting CI minutes on commits that are already obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solidity:
    name: Solidity — forge test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        # Phase 2 PR 2.9 follow-up: pinned to commit SHA (not moving @v1
        # tag) so a compromised future foundry-rs release can't silently
        # retarget our CI. To refresh: re-run
        #   gh api repos/foundry-rs/foundry-toolchain/git/refs/tags/v1 --jq '.object.sha'
        # and verify the new SHA against the foundry-rs release notes
        # before updating.
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: stable

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vv

  backend:
    name: Backend — node --test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        # This is an npm workspace monorepo, so the root package-lock.json
        # resolves both mcp-server and indexer. `npm ci` enforces the lock.
        run: npm ci

      - name: Unit tests
        run: npm test --workspace mcp-server

      - name: HTTP smoke tests
        # Full integration tests that spin up the real HTTP server in a
        # child process and make real fetch() calls. Kept opt-in for
        # local dev to stay fast; always on for CI.
        env:
          RUN_HTTP_SMOKE: "1"
        working-directory: mcp-server
        run: node --test --test-timeout=30000 src/protocols/http/server.smoke.test.js

      - name: Ops script regression tests
        run: npm run test:ops

      - name: Discovery manifest sync check
        run: npm run check:discovery-manifest

  frontend:
    name: Operator app — static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:app

      - name: Build static operator export
        run: npm run build:frontend

  public-site:
    name: Public site — static export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build public site
        run: npm run build:site

  indexer:
    name: Indexer — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:indexer

  env-template-structure:
    name: Phase 2 — env template structural lint
    runs-on: ubuntu-latest
    # Structural check only: validates that every op:// reference in
    # deploy/*.env.template matches a row in deploy/secrets-inventory.md,
    # uses a known vault, and is read by a service-account that has access.
    # Does NOT call `op inject` — that requires a real 1Password session
    # and lands in PR 2.1 once the CI service-account token is wired up.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Structural lint
        run: node scripts/ops/check-env-template-structure.mjs

      # Phase 2 PR 2.6: enforce that deploy/backend.env.template matches
      # the settlement values derived from deployments/testnet.json. Before
      # this guard, the runtime configure_settlement_env in
      # scripts/ops/deploy-production.sh would silently paper over drift
      # by overwriting /srv/backend.env on every deploy. That function is
      # retired in PR 2.6 — drift now needs to be caught at CI time.
      - name: Template matches manifest (settlement values)
        run: node scripts/ops/check-template-matches-manifest.mjs

      # Phase 2 PR 2.9: npm install-script supply-chain guard.
      # Scans package-lock.json for transitive deps with
      # `hasInstallScript: true` and fails if any are not in the
      # allowlist at deploy/npm-install-scripts-allowlist.json.
      # Pre-empts the Mini Shai-Hulud (Sep 2026) attack shape:
      # compromised transitive dep silently pulled into lockfile,
      # executes attacker-controlled code with the runner's full
      # secret access at install time. Our own package.json files
      # have ZERO lifecycle scripts (verified at PR 2.9 build);
      # this guard covers transitive deps.
      - name: npm install-script supply-chain allowlist
        run: node scripts/ops/check-npm-install-scripts.mjs
