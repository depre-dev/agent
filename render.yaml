# DEPRECATED 2026-05-17.
#
# Production deploys go through .github/workflows/deploy-production.yml to
# the VPS — Render.com is not a current deployment target. This file is
# kept for historical reference only and is not maintained.
#
# Known drift from the live deploy:
#   - References SIGNER_PRIVATE_KEY, which was removed at the Phase 3 KMS
#     cutover (2026-05-16). The active backend uses SIGNER_BACKEND=kms
#     plus AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / KMS_KEY_ID /
#     AWS_REGION instead. See docs/SECRETS_MIGRATION.md.
#   - Does not declare AUTH_JWT_SECRETS, RESEND_API_KEY, the GITHUB_TOKEN
#     ingestion key, BOOTSTRAP_SELF_REPORT_*, or any of the canonical
#     contract addresses kept in deploy/backend.env.template.
#
# Do not use this file to provision a new Render service without first
# reconciling against deploy/backend.env.template and
# docs/SECRETS_MIGRATION.md. If Render is permanently retired, delete
# this file in a separate PR.

services:
  - type: web
    name: polkadot-agent-platform
    runtime: node
    rootDir: mcp-server
    plan: free
    buildCommand: npm install
    startCommand: npm run start:http
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REDIS_NAMESPACE
        value: agent-platform
      - key: DWELLER_RPC_URL
        sync: false
      - key: POLKADOT_RPC_URL
        sync: false
      - key: RPC_URL
        sync: false
      - key: SIGNER_PRIVATE_KEY
        sync: false
      - key: AGENT_ACCOUNT_ADDRESS
        sync: false
      - key: ESCROW_CORE_ADDRESS
        sync: false
      - key: REPUTATION_SBT_ADDRESS
        sync: false
      - key: DISCOVERY_REGISTRY_ADDRESS
        sync: false
      - key: SUPPORTED_ASSETS
        sync: false
      - key: REDIS_URL
        sync: false
  - type: web
    name: polkadot-agent-indexer
    runtime: node
    rootDir: indexer
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DWELLER_RPC_URL
        sync: false
      - key: POLKADOT_RPC_URL
        sync: false
      - key: PONDER_RPC_URL_420420417
        value: https://eth-rpc-testnet.polkadot.io/
      - key: DATABASE_URL
        sync: false
      - key: PONDER_DISCOVERY_REGISTRY_ADDRESS
        sync: false
      - key: XCM_EXTERNAL_SOURCE_TYPE
        sync: false
      - key: XCM_EXTERNAL_SOURCE_URL
        sync: false
      - key: XCM_EXTERNAL_SOURCE_AUTH_TOKEN
        sync: false
      - key: XCM_SUBSCAN_API_HOST
        sync: false
      - key: XCM_SUBSCAN_API_KEY
        sync: false
