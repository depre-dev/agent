services:
  - type: web
    name: polkadot-agent-platform
    runtime: node
    rootDir: mcp-server
    plan: free
    buildCommand: npm install
    startCommand: npm run start:http
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REDIS_NAMESPACE
        value: agent-platform
      - key: DWELLER_RPC_URL
        sync: false
      - key: POLKADOT_RPC_URL
        sync: false
      - key: RPC_URL
        sync: false
      - key: SIGNER_PRIVATE_KEY
        sync: false
      - key: AGENT_ACCOUNT_ADDRESS
        sync: false
      - key: ESCROW_CORE_ADDRESS
        sync: false
      - key: REPUTATION_SBT_ADDRESS
        sync: false
      - key: DISCOVERY_REGISTRY_ADDRESS
        sync: false
      - key: SUPPORTED_ASSETS
        sync: false
      - key: REDIS_URL
        sync: false
  - type: web
    name: polkadot-agent-indexer
    runtime: node
    rootDir: indexer
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DWELLER_RPC_URL
        sync: false
      - key: POLKADOT_RPC_URL
        sync: false
      - key: PONDER_RPC_URL_420420417
        value: https://eth-rpc-testnet.polkadot.io/
      - key: DATABASE_URL
        sync: false
      - key: PONDER_DISCOVERY_REGISTRY_ADDRESS
        sync: false
      - key: XCM_EXTERNAL_SOURCE_TYPE
        sync: false
      - key: XCM_EXTERNAL_SOURCE_URL
        sync: false
      - key: XCM_EXTERNAL_SOURCE_AUTH_TOKEN
        sync: false
      - key: XCM_SUBSCAN_API_HOST
        sync: false
      - key: XCM_SUBSCAN_API_KEY
        sync: false
